<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Times Tables — Division</title>
    <meta name="description" content="A free division drill built by Claude AI. Wrong answers come back until you know them.">
    <meta name="keywords" content="times tables, division drill, free, practice, maths, dyscalculia">
    <script>
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            window.location.replace('division-mobile.html');
        }
    </script>
    <script>try{if(localStorage.getItem('dark')==='1')document.documentElement.classList.add('dark');}catch(e){}</script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=EB+Garamond:wght@400;500&family=Libre+Baskerville:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #faf9f7;
            font-family: 'EB Garamond', 'Times New Roman', serif;
            color: #1a1916;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 3rem 1.5rem;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
            border-bottom: 0.5px solid #c8c4bc;
            padding-bottom: 1.5rem;
            width: 100%;
            max-width: 420px;
        }

        .title {
            font-family: 'Cormorant Garamond', 'Times New Roman', serif;
            font-weight: 600;
            font-size: 32px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: #1a1916;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 13px;
            color: #8a8680;
            letter-spacing: .15em;
            text-transform: uppercase;
            font-style: italic;
        }

        .stats-row {
            display: flex;
            gap: 0;
            margin-bottom: 2.5rem;
            width: 100%;
            max-width: 420px;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            overflow: hidden;
        }

        .stat {
            flex: 1;
            padding: 12px 10px;
            text-align: center;
            border-right: 0.5px solid #c8c4bc;
        }

            .stat:last-child {
                border-right: none;
            }

        .stat-num {
            font-family: 'Libre Baskerville', 'Georgia', serif;
            font-size: 26px;
            font-weight: 700;
            color: #1a1916;
            line-height: 1;
        }

        .stat-label {
            font-size: 10px;
            color: #8a8680;
            text-transform: uppercase;
            letter-spacing: .1em;
            margin-top: 3px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            padding: 3rem 2rem;
            text-align: center;
            margin-bottom: 1.5rem;
            background: #fff;
        }

        .question {
            font-family: 'Libre Baskerville', 'Georgia', serif;
            font-size: 64px;
            font-weight: 700;
            color: #1a1916;
            letter-spacing: -1px;
            margin-bottom: 10px;
            line-height: 1;
        }

        .hint {
            font-size: 14px;
            color: #8a8680;
            min-height: 20px;
            font-style: italic;
            letter-spacing: .01em;
        }

        .input-row {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 420px;
            margin-bottom: 1rem;
        }

        .answer-input {
            flex: 1;
            background: #fff;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            padding: 14px 18px;
            font-family: 'Libre Baskerville', 'Georgia', serif;
            font-size: 28px;
            font-weight: 700;
            color: #1a1916;
            text-align: center;
            outline: none;
            transition: border-color .15s;
        }

            .answer-input:focus {
                border-color: #1a1916;
            }

            .answer-input.correct {
                border-color: #3a7d5e;
                color: #3a7d5e;
            }

            .answer-input.wrong {
                border-color: #b84040;
                color: #b84040;
            }

        .submit-btn {
            background: #1a1916;
            color: #faf9f7;
            border: none;
            border-radius: 2px;
            padding: 14px 22px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            cursor: pointer;
            transition: opacity .15s, transform .1s;
            letter-spacing: .05em;
        }

            .submit-btn:hover {
                opacity: .8;
            }

            .submit-btn:active {
                transform: scale(0.97);
            }

        .feedback {
            font-size: 15px;
            min-height: 22px;
            margin-bottom: 1rem;
            font-style: italic;
            text-align: center;
            letter-spacing: .01em;
        }

            .feedback.correct {
                color: #3a7d5e;
            }

            .feedback.wrong {
                color: #b84040;
            }

        .hint-btn {
            background: transparent;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            padding: 7px 16px;
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            color: #8a8680;
            cursor: pointer;
            transition: all .15s;
            margin-bottom: 2rem;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

            .hint-btn:hover {
                border-color: #1a1916;
                color: #1a1916;
            }

        .progress-bar-wrap {
            width: 100%;
            max-width: 420px;
            height: 1px;
            background: #c8c4bc;
            margin-bottom: 2rem;
        }

        .progress-bar-fill {
            height: 100%;
            background: #1a1916;
            transition: width .4s ease;
        }

        .missed-section {
            width: 100%;
            max-width: 420px;
            margin-top: .5rem;
        }

        .missed-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: #8a8680;
            margin-bottom: 8px;
        }

        .missed-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .missed-pill {
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 1px;
            background: #fff;
            border: 0.5px solid #c8a0a0;
            color: #b84040;

        }

        .done-screen {

            text-align: center;
            width: 100%;
            max-width: 420px;
            padding-top: 1rem;
        }

        .done-title {
            font-family: 'Cormorant Garamond', serif;

        }

        .done-sub {

        }

        .done-buttons {

        .restart-btn {

        .mc-hint {
            margin-top: 10px;
            font-size: 12px;
            font-style: italic;
            color: #c8a060;

        }

        .timer-bar-wrap {
            width: 100%;
            max-width: 420px;
            height: 2px;
            background: #eeecea;
            margin-top: -1.5rem;
            margin-bottom: 1.5rem;

        .timer-bar-fill {

        .settings-row {

        /* ── DARK MODE ── */
        .sess-active { color: #1a1916; }

        html.dark .title { color: #faf9f7; }
        html.dark .subtitle { color: #6a6660; }

        html.dark .done-title { color: #faf9f7; }

<body>

    <button id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">☽</button>

    <div class="header">
        <div class="title">Times Tables</div>
        <div class="subtitle">Division drill</div>
        <a href="index.html" style="display:inline-block;margin-top:8px;font-family:'EB Garamond',serif;font-size:11px;color:#aaa69e;text-decoration:none;letter-spacing:.12em;text-transform:uppercase;">× Multiplication</a>
    </div>

    <div class="stats-row">
        <div class="stat"><div class="stat-num" id="stat-correct">0</div><div class="stat-label">Correct</div></div>
        <div class="stat"><div class="stat-num" id="stat-wrong">0</div><div class="stat-label">Missed</div></div>
        <div class="stat"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">Streak</div></div>
    </div>

    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="settings-row" style="margin-bottom:.5rem">
        <label>Session</label>
        <span id="sess-full" class="sess-active" onclick="setSessionSize(0)" style="cursor:pointer;min-width:auto;text-align:left;font-weight:600">Full</span>
        <span style="color:#c8c4bc;min-width:auto">·</span>
        <span id="sess-25" onclick="setSessionSize(25)" style="cursor:pointer;min-width:auto;text-align:left">25</span>
        <span style="color:#c8c4bc;min-width:auto">·</span>
        <span id="sess-50" onclick="setSessionSize(50)" style="cursor:pointer;min-width:auto;text-align:left">50</span>
    </div>

    <div class="settings-row">
        <label for="mc-timer-range">Moron checker</label>
        <input type="range" id="mc-timer-range" min="3" max="15" value="5" step="1" oninput="updateTimerLabel(this.value)">
        <span id="mc-timer-label">5s</span>
    </div>

    <div id="drill-screen">
        <div class="card">
            <div class="question" id="question">? ÷ ?</div>
            <div class="hint" id="hint-text"></div>
        </div>

        <div class="timer-bar-wrap">
            <div class="timer-bar-fill" id="timer-bar"></div>
        </div>

        <div class="input-row">
            <input class="answer-input" id="answer-input" type="number" inputmode="numeric" placeholder="—" autocomplete="off" />
            <button class="submit-btn" onclick="submitAnswer()">→</button>
        </div>

        <div class="feedback" id="feedback"></div>
        <button class="hint-btn" onclick="showHint()">Show hint</button>

        <div class="missed-section" id="missed-section" style="display:none">
            <div class="missed-title">Still shaky</div>
            <div class="missed-pills" id="missed-pills"></div>
        </div>
    </div>

    <div class="done-screen" id="done-screen">
        <div class="done-title" id="done-title">Complete.</div>
        <div class="done-sub" id="done-sub"></div>
        <div class="done-sub" id="done-time"></div>
        <div class="done-buttons">
            <button class="restart-btn" onclick="startFresh()">Full drill again</button>
            <button class="missed-only-btn" id="missed-only-btn" onclick="drillMissed()">Missed only</button>
        </div>
        <div id="done-history"></div>
    </div>

    <div class="mc-overlay" id="mc-overlay" tabindex="-1" onclick="dismissMC()">
        <div class="mc-label" id="mc-label"></div>
        <div class="mc-grid-wrap" id="mc-grid-wrap"><table class="mc-grid" id="mc-grid"></table></div>
        <div class="mc-hint" id="mc-hint"></div>
        <div class="mc-dismiss">Any key or tap to dismiss</div>
    </div>

    <script>
        const HINTS = {
            '2': n => `${n} + ${n}`,
            '3': n => `3 × ${n - 1} + ${n} = ${3 * (n - 1)} + ${n}`,
            '4': n => `Double ${n}, then double again — ${n * 2} × 2`,
            '5': n => `Count by fives — ends in 0 or 5`,
            '6': n => `5 × ${n} + ${n} = ${5 * n} + ${n}`,
            '7': n => `5 × ${n} + 2 × ${n} = ${5 * n} + ${2 * n}`,
            '8': n => `Double, double, double — 2 × ${n} × 2 × 2`,
            '9': n => `10 × ${n} − ${n} = ${10 * n} − ${n}`,
            '10': n => `Add a zero — ${n}0`,
            '11': n => n <= 9 ? `Repeat the digit — ${n}${n}` : `10 × ${n} + ${n} = ${10 * n} + ${n}`,
            '12': n => `10 × ${n} + 2 × ${n} = ${10 * n} + ${2 * n}`,
        };

        function buildTable() {
            let facts = [];
            for (let a = 2; a <= 12; a++)
                for (let b = a; b <= 12; b++)
                    facts.push([a, b]);
            return facts;
        }

        let allFacts = buildTable();
        let queue = [], missed = {}, correct = 0, wrong = 0, streak = 0, current = null, total = 0, done_count = 0;
        let drillStart = null;
        let mcTimer = null, mcAnimFrame = null, mcStartTime = null, mcDuration = 5000;
        let mcVisible = false;
        let sessionSize = 0;

        function updateTimerLabel(val) {
            document.getElementById('mc-timer-label').textContent = val + 's';
            mcDuration = parseInt(val) * 1000;
        }

        function setSessionSize(n) {
            sessionSize = n;
            [['sess-full', 0], ['sess-25', 25], ['sess-50', 50]].forEach(([id, val]) => {
                const el = document.getElementById(id);
                el.classList.toggle('sess-active', n === val);
                el.style.fontWeight = n === val ? '600' : '';
            });
            startFresh();
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function startFresh() {
            drillStart = Date.now();
            let pool = shuffle([...allFacts]);
            if (sessionSize > 0) pool = pool.slice(0, sessionSize);
            queue = [...pool];
            missed = {}; correct = 0; wrong = 0; streak = 0; done_count = 0;
            total = queue.length;
            document.getElementById('done-screen').style.display = 'none';
            document.getElementById('drill-screen').style.display = 'block';
            updateStats(); nextQuestion();
        }

        function drillMissed() {
            const mf = Object.keys(missed).map(k => missed[k].fact);
            if (!mf.length) return;
            drillStart = Date.now();
            queue = shuffle([...mf, ...mf]);
            missed = {}; correct = 0; wrong = 0; streak = 0; done_count = 0;
            total = queue.length;
            document.getElementById('done-screen').style.display = 'none';
            document.getElementById('drill-screen').style.display = 'block';
            updateStats(); nextQuestion();
        }

        function nextQuestion() {
            clearMC();
            if (!queue.length) { showDone(); return; }
            const flip = Math.random() > 0.5;
            const [a, b] = queue.pop();
            // current = [knownFactor, unknownFactor]
            // Question: (knownFactor × unknownFactor) ÷ knownFactor = ?
            current = flip ? [b, a] : [a, b];
            document.getElementById('question').textContent = `${current[0] * current[1]} ÷ ${current[0]}`;
            document.getElementById('hint-text').textContent = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            const inp = document.getElementById('answer-input');
            inp.value = ''; inp.className = 'answer-input'; inp.focus();
            updateProgress(); updateMissed();
            startMoronTimer();
        }

        // ── MORON CHECKER ──────────────────────────────────────────────
        let _timerGen = 0, _timerTimeout = null, _timerRaf = null, _timerStart = null;

        function startMoronTimer() {
            _clearTimer();
            const gen = ++_timerGen;
            _timerStart = performance.now();
            function tick(now) {
                if (_timerGen !== gen) return;
                const pct = Math.max(0, 1 - (now - _timerStart) / mcDuration);
                document.getElementById('timer-bar').style.width = (pct * 100) + '%';
                if (pct > 0) _timerRaf = requestAnimationFrame(tick);
            }
            _timerRaf = requestAnimationFrame(tick);
            _timerTimeout = setTimeout(() => {
                if (_timerGen !== gen) return;
                showMC();
            }, mcDuration);
        }

        function _clearTimer() {
            _timerGen++;
            if (_timerTimeout) { clearTimeout(_timerTimeout); _timerTimeout = null; }
            if (_timerRaf)     { cancelAnimationFrame(_timerRaf); _timerRaf = null; }
            _timerStart = null;
            document.getElementById('timer-bar').style.width = '100%';
        }

        function clearMC() {
            _clearTimer();
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('mc-hint').textContent = '';
        }

        function dismissMC() {
            if (!mcVisible) return;
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('answer-input').focus();
        }

        function showMC() {
            if (!current) return;
            const [qa, qb] = current;
            const product = qa * qb;
            const label = mcDuration > 2500 ? `yeah — ${product} ÷ ${qa}` : `moron checker — ${product} ÷ ${qa}`;
            document.getElementById('mc-label').textContent = label;
            buildGrid(qa, qb);
            document.getElementById('mc-hint').textContent = getHint(qa, qb);
            mcVisible = true;
            document.getElementById('mc-overlay').classList.add('visible');
            document.getElementById('answer-input').focus();
            setTimeout(() => {
                const hl = document.querySelector('.mc-highlight');
                const wrap = document.getElementById('mc-grid-wrap');
                if (hl && wrap) {
                    const cellLeft = hl.offsetLeft;
                    const cellTop = hl.offsetTop;
                    wrap.scrollLeft = cellLeft - wrap.clientWidth / 2 + hl.offsetWidth / 2;
                    wrap.scrollTop = cellTop - wrap.clientHeight / 2 + hl.offsetHeight / 2;
                }
            }, 50);
        }

        function buildGrid(qa, qb) {
            const table = document.getElementById('mc-grid');
            table.innerHTML = '';
            const cols = [];
            for (let c = 2; c <= 12; c++) cols.push(c);

            const thead = document.createElement('tr');
            const corner = document.createElement('td');
            corner.className = 'mc-header';
            corner.textContent = '×';
            thead.appendChild(corner);
            for (const c of cols) {
                const th = document.createElement('td');
                th.textContent = c;
                // answer column header gets the black highlight — that's what you type
                if (c === qb) {
                    th.className = 'mc-highlight';
                } else {
                    th.className = 'mc-header';
                }
                thead.appendChild(th);
            }
            table.appendChild(thead);

            for (let r = 2; r <= 12; r++) {
                const tr = document.createElement('tr');
                const rh = document.createElement('td');
                rh.textContent = r;
                rh.className = r === qa ? 'mc-row-header' : 'mc-header';
                tr.appendChild(rh);
                for (const c of cols) {
                    const td = document.createElement('td');
                    td.textContent = r * c;
                    if (r === qa && c === qb) {
                        // product cell — amber, not black (it's the given, not the answer)
                        td.style.background = '#c8a060';
                        td.style.color = '#fff';
                        td.style.fontWeight = '700';
                    } else if (r === qa || c === qb) {
                        const dark = document.documentElement.classList.contains('dark');
                        td.style.background = dark ? '#1e2228' : '#f5f0e8';
                        td.style.color = dark ? '#6a6660' : '#9a8060';
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function getHint(a, b) {
            const key = String(Math.min(a, b)), other = Math.max(a, b);
            return HINTS[key] ? HINTS[key](other) : `${a} × ${b} = ${a * b}`;
        }

        function showHint() {
            if (current) document.getElementById('hint-text').textContent = getHint(current[0], current[1]);
        }

        function submitAnswer() {
            if (!current) return;
            if (mcVisible) { dismissMC(); return; }
            clearMC();
            const inp = document.getElementById('answer-input');
            const val = parseInt(inp.value);
            if (isNaN(val)) return;
            const ans = current[1]; // the unknown factor
            const key = current[0] + '÷' + current[1];

            if (val === ans) {
                inp.className = 'answer-input correct';
                document.getElementById('feedback').textContent = streak >= 4 ? `${streak + 1} in a row` : 'Correct';
                document.getElementById('feedback').className = 'feedback correct';
                correct++; streak++; done_count++;
                if (missed[key]) { missed[key].count--; if (missed[key].count <= 0) delete missed[key]; }
                updateStats();
                setTimeout(nextQuestion, 600);
            } else {
                inp.className = 'answer-input wrong';
                document.getElementById('feedback').textContent = '';
                document.getElementById('feedback').className = 'feedback wrong';
                wrong++; streak = 0;
                if (!missed[key]) missed[key] = { fact: current, count: 0 };
                missed[key].count++;
                queue.unshift(current);
                updateStats();
                showMC();
                setTimeout(() => {
                    inp.value = ''; inp.className = 'answer-input';
                    document.getElementById('feedback').textContent = '';
                    document.getElementById('feedback').className = 'feedback';
                }, 500);
            }
        }

        function updateStats() {
            document.getElementById('stat-correct').textContent = correct;
            document.getElementById('stat-wrong').textContent = wrong;
            document.getElementById('stat-streak').textContent = streak;
        }

        function updateProgress() {
            const pct = total > 0 ? Math.round((done_count / total) * 100) : 0;
            document.getElementById('progress-bar').style.width = pct + '%';
        }

        function updateMissed() {
            const keys = Object.keys(missed);
            const sec = document.getElementById('missed-section');
            if (!keys.length) { sec.style.display = 'none'; return; }
            sec.style.display = 'block';
            document.getElementById('missed-pills').innerHTML = keys.map(k => {
                const [a, b] = missed[k].fact;
                return `<span class="missed-pill">${a * b} ÷ ${a} = ${b}</span>`;
            }).join('');
        }

        function fmtDrillTime(ms) {
            const s = Math.round(ms / 1000);
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function saveDrillResult(key, pct, timeStr, sizeLabel) {
            let hist = [];
            try { hist = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) {}
            const d = new Date();
            hist.unshift({ date: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), accuracy: pct, time: timeStr, size: sizeLabel });
            if (hist.length > 5) hist.length = 5;
            try { localStorage.setItem(key, JSON.stringify(hist)); } catch(e) {}
            return hist;
        }

        function renderDrillHistory(hist) {
            if (!hist.length) return '';
            return '<div class="done-history"><div class="done-history-label">Recent</div>'
                + hist.map(r => `<div class="done-history-row">${r.date} &middot; ${r.size || 'Full'} &middot; ${r.accuracy}% &middot; ${r.time}</div>`).join('')
                + '</div>';
        }

        function showDone() {
            clearMC();
            document.getElementById('drill-screen').style.display = 'none';
            document.getElementById('done-screen').style.display = 'block';
            const elapsed = drillStart ? Date.now() - drillStart : 0;
            const timeStr = fmtDrillTime(elapsed);
            const sessionLabel = sessionSize === 0 ? 'Full' : String(sessionSize);
            const t = correct + wrong;
            const pct = t > 0 ? Math.round((correct / t) * 100) : 0;
            document.getElementById('done-title').textContent = pct >= 90 ? 'Excellent.' : pct >= 70 ? 'Good progress.' : 'Keep going.';
            document.getElementById('done-sub').textContent = `${correct} correct, ${wrong} missed — ${pct}% accuracy`;
            document.getElementById('done-time').textContent = timeStr + ' · ' + sessionLabel;
            document.getElementById('missed-only-btn').style.display = Object.keys(missed).length ? 'inline-block' : 'none';
            const hist = saveDrillResult('history_divide', pct, timeStr, sessionLabel);
            document.getElementById('done-history').innerHTML = renderDrillHistory(hist);
        }

        function toggleDark() {
            const dark = document.documentElement.classList.toggle('dark');
            try { localStorage.setItem('dark', dark ? '1' : '0'); } catch(e) {}
        }

        document.getElementById('answer-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitAnswer();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') return;
            if (mcVisible) dismissMC();
        });

        startFresh();
    </script>
