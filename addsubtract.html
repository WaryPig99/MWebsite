<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Times Tables — Add &amp; Subtract</title>
    <script>try { if (localStorage.getItem('dark') === '1') document.documentElement.classList.add('dark'); } catch (e) { }</script>
    <link rel="stylesheet" href="shared.css">
    <style>
        .subtitle { margin-bottom: 10px; }

        .mode-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .mode-btn {
            font-family: 'EB Garamond', serif;
            font-size: 11px;
            color: #aaa69e;
            text-transform: uppercase;
            letter-spacing: .12em;
            cursor: pointer;
            transition: color .15s;
            user-select: none;
        }
        .mode-btn:hover { color: #1a1916; }
        .mode-btn.active { color: #1a1916; font-weight: 600; }
        .mode-sep { font-size: 11px; color: #c8c4bc; }

        /* Slightly smaller question to fit 3-digit expressions */
        .question { font-size: 48px !important; letter-spacing: -1px; }

        /* Strategy card shown in mc-overlay instead of the grid */
        .mc-content {
            font-family: 'Libre Baskerville', 'Georgia', serif;
            text-align: center;
            padding: 1.5rem 2.5rem;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            background: #fff;
            min-width: 220px;
        }
        .mc-strategy-label {
            font-family: 'EB Garamond', serif;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .12em;
            color: #aaa69e;
            margin-bottom: 8px;
        }
        .mc-step {
            font-size: 16px;
            color: #1a1916;
            margin: 5px 0;
            letter-spacing: -0.3px;
        }
        .mc-step strong { font-weight: 700; }
        .mc-step.answer {
            font-size: 28px;
            font-weight: 700;
            margin-top: 6px;
        }
        .mc-fact-divider {
            border: none;
            border-top: 0.5px solid #c8c4bc;
            margin: 8px auto;
            width: 60px;
        }

        /* Dark mode */
        html.dark .mode-btn { color: #6a6660; }
        html.dark .mode-btn:hover { color: #c8c4bc; }
        html.dark .mode-btn.active { color: #faf9f7; }
        html.dark .mode-sep { color: #3d4148; }
        html.dark .mc-content { background: #13161a; border-color: #252830; }
        html.dark .mc-strategy-label { color: #6a6660; }
        html.dark .mc-step { color: #c8c4bc; }
        html.dark .mc-step strong { color: #faf9f7; }
        html.dark .mc-step.answer { color: #faf9f7; }
        html.dark .mc-fact-divider { border-top-color: #252830; }
    </style>
</head>
<body>

    <button id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">☽</button>

    <div class="header">
        <div class="title" style="font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase;">The Four Operations</div>
        <div class="subtitle">Add &amp; Subtract</div>
        <div class="mode-toggle">
            <span class="mode-btn active" data-mode="singles" onclick="setMode('singles')">1-digit</span>
            <span class="mode-sep">·</span>
            <span class="mode-btn" data-mode="add" onclick="setMode('add')">+ Add</span>
            <span class="mode-sep">·</span>
            <span class="mode-btn" data-mode="sub" onclick="setMode('sub')">− Sub</span>
            <span class="mode-sep">·</span>
            <span class="mode-btn" data-mode="mix" onclick="setMode('mix')">± Mix</span>
        </div>
        <div style="margin-top:8px;display:flex;align-items:center;justify-content:center;gap:10px;">
            <a href="index.html" style="font-family:'EB Garamond',serif;font-size:11px;color:#aaa69e;text-decoration:none;letter-spacing:.12em;text-transform:uppercase;">× times tables</a>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat"><div class="stat-num" id="s-correct">0</div><div class="stat-label">Correct</div></div>
        <div class="stat"><div class="stat-num" id="s-wrong">0</div><div class="stat-label">Missed</div></div>
        <div class="stat"><div class="stat-num" id="s-streak">0</div><div class="stat-label">Streak</div></div>
    </div>

    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>

    <div class="settings-row" style="margin-bottom:.5rem">
        <label>Session</label>
        <span id="sess-full" class="sess-active" onclick="setSessionSize(0)" style="cursor:pointer;min-width:auto;text-align:left;font-weight:600">Full</span>
        <span style="color:#c8c4bc;min-width:auto">·</span>
        <span id="sess-25" onclick="setSessionSize(25)" style="cursor:pointer;min-width:auto;text-align:left">25</span>
        <span style="color:#c8c4bc;min-width:auto">·</span>
        <span id="sess-50" onclick="setSessionSize(50)" style="cursor:pointer;min-width:auto;text-align:left">50</span>
    </div>

    <div class="settings-row">
        <label for="mc-timer-range">Hint timer</label>
        <input type="range" id="mc-timer-range" min="3" max="15" value="5" step="1" oninput="updateTimerLabel(this.value)">
        <span id="mc-timer-label">5s</span>
    </div>

    <div id="drill-screen">
        <div class="card">
            <div class="question" id="question">? + ?</div>
            <div class="hint" id="hint-text"></div>
        </div>

        <div class="timer-bar-wrap">
            <div class="timer-bar-fill" id="timer-fill"></div>
        </div>

        <div class="input-row">
            <input class="answer-input" id="answer-input" type="number" inputmode="numeric" placeholder="—" autocomplete="off" />
            <button class="submit-btn" onclick="submitAnswer()">→</button>
        </div>

        <div class="feedback" id="feedback"></div>
        <button class="hint-btn" onclick="showHint()">Show hint</button>

        <div class="missed-section" id="missed-section" style="display:none">
            <div class="missed-title">Still shaky</div>
            <div class="missed-pills" id="missed-pills"></div>
        </div>
    </div>

    <div class="done-screen" id="done-screen">
        <div class="done-panel">
            <div class="done-title" id="done-title">Complete.</div>
            <div class="done-sub" id="done-sub"></div>
            <div class="done-sub" id="done-time"></div>
            <div class="done-buttons">
                <button class="restart-btn" onclick="startFresh()">Full drill again</button>
                <button class="missed-only-btn" id="missed-only-btn" onclick="drillMissed()">Missed only</button>
            </div>
            <div id="done-history"></div>
        </div>
    </div>

    <div class="mc-overlay" id="mc-overlay" tabindex="-1" onclick="dismissMC()">
        <div class="mc-label" id="mc-label"></div>
        <div class="mc-content" id="mc-content"></div>
        <div class="mc-hint" id="mc-hint"></div>
        <div class="mc-dismiss">Any key or tap to dismiss</div>
    </div>

    <script src="shared.js"></script>
    <script src="idle.js"></script>
    <script>
        let currentMode = 'singles';
        window.idleQuestionValue = 0.3;
        let queue = [], missed = {}, correct = 0, wrong = 0, streak = 0, current = null, total = 0, doneCount = 0;
        let drillStart = null;
        let mcVisible = false;
        let sessionSize = 0;

        // ── FACT POOL ───────────────────────────────────────────────────
        // Each fact: { a, b, op, answer, strategy }
        // Strategies: doubles | bonds | near-doubles | recall | partitioning | compensating | doubling | halving

        function classifySingle(a, b, op) {
            if (op === '+') {
                if (a === b)                        return 'doubles';
                if (a + b === 10)                   return 'bonds';
                if (Math.abs(a - b) <= 2)           return 'near-doubles';
                return 'recall';
            } else {
                // subtraction: a - b
                if (b === a / 2 && a % 2 === 0)    return 'doubles';
                if (b + a === 10 || a === 10)       return 'bonds';
                if (Math.abs(a - 2 * b) <= 2)      return 'near-doubles';
                return 'recall';
            }
        }

        function buildSingleFacts() {
            const facts = [];
            // All x + y where x >= y, 1–9
            for (let a = 1; a <= 9; a++) {
                for (let b = 1; b <= a; b++) {
                    const strategy = classifySingle(a, b, '+');
                    facts.push({ a, b, op: '+', answer: a + b, strategy });
                    // Also the flip (b + a) so both orders get drilled
                    if (a !== b) facts.push({ a: b, b: a, op: '+', answer: a + b, strategy });
                }
            }
            // All a - b where a > b, 2–18 (covers the addition inverses too)
            for (let a = 2; a <= 18; a++) {
                for (let b = 1; b < a; b++) {
                    if (b > 9 || (a - b) < 1 || (a - b) > 9) continue; // keep answers 1-9
                    const strategy = classifySingle(a, b, '-');
                    facts.push({ a, b, op: '-', answer: a - b, strategy });
                }
            }
            return facts;
        }

        function buildAllFacts() {
            const facts = [];

            // PARTITIONING — Addition (clean place values, no carrying)
            [
                [247, 121], [134, 253], [312, 465], [523, 241], [143, 325],
                [231, 546], [412, 253], [321, 164], [461, 238], [143, 325],
                [43, 25],   [67, 31],   [82, 15],   [54, 23],   [74, 25],
            ].forEach(([a, b]) => facts.push({ a, b, op: '+', answer: a + b, strategy: 'partitioning' }));

            // COMPENSATING — Addition (b ends in 8 or 9)
            [
                [134, 29],  [256, 49],  [367, 19],  [145, 39],  [423, 99],
                [63, 29],   [47, 19],   [85, 38],   [124, 49],  [236, 99],
                [345, 29],  [167, 19],  [243, 49],  [312, 98],  [156, 39],
            ].forEach(([a, b]) => facts.push({ a, b, op: '+', answer: a + b, strategy: 'compensating' }));

            // DOUBLING — Addition (numbers within 4 of each other)
            [
                [35, 37],   [64, 66],   [123, 127], [245, 249], [43, 45],
                [78, 80],   [151, 155], [96, 98],   [212, 214], [167, 171],
                [48, 52],   [99, 101],  [148, 152], [223, 227], [74, 76],
            ].forEach(([a, b]) => facts.push({ a, b, op: '+', answer: a + b, strategy: 'doubling' }));

            // PARTITIONING — Subtraction (no borrowing — every digit of a > corresponding digit of b)
            [
                [85, 22],   [349, 125], [567, 241], [76, 34],   [98, 45],
                [467, 234], [789, 356], [654, 321], [87, 43],   [96, 52],
                [579, 246], [348, 215], [965, 432], [74, 31],   [89, 57],
            ].forEach(([a, b]) => facts.push({ a, b, op: '-', answer: a - b, strategy: 'partitioning' }));

            // COMPENSATING — Subtraction (b ends in 8 or 9)
            [
                [322, 39],  [145, 29],  [256, 19],  [134, 48],  [83, 29],
                [67, 19],   [92, 38],   [214, 99],  [363, 49],  [452, 199],
                [176, 29],  [345, 38],  [423, 99],  [265, 49],  [183, 29],
            ].forEach(([a, b]) => facts.push({ a, b, op: '-', answer: a - b, strategy: 'compensating' }));

            // HALVING — Subtraction (b ≈ a/2 with small whole delta; a is always even)
            [
                [240, 123], [180, 91],  [360, 182], [500, 251], [80, 41],
                [120, 62],  [200, 101], [300, 152], [160, 79],  [400, 203],
                [280, 141], [140, 69],  [320, 163], [600, 301], [440, 221],
            ].forEach(([a, b]) => facts.push({ a, b, op: '-', answer: a - b, strategy: 'halving' }));

            return facts;
        }

        // ── STRATEGY STEP BUILDER ───────────────────────────────────────

        function placeValues(n) {
            return {
                h: Math.floor(n / 100) * 100,
                t: Math.floor((n % 100) / 10) * 10,
                o: n % 10
            };
        }

        function buildMCContent(fact) {
            const { a, b, op, answer, strategy } = fact;
            const strategyName = {
                'doubles':       'Doubles',
                'bonds':         'Bonds to 10',
                'near-doubles':  'Near Doubles',
                'recall':        'Recall',
                'partitioning':  'Partitioning',
                'compensating':  'Compensating',
                'doubling':      'Doubling',
                'halving':       'Halving'
            }[strategy] || strategy;

            let rows = [];

            // ── SINGLE-DIGIT STRATEGIES ────────────────────────────────
            if (strategy === 'doubles' && op === '+') {
                rows.push(`${a} + ${b}`);
                rows.push(`→ 2 × ${a}`);

            } else if (strategy === 'doubles' && op === '-') {
                // e.g. 8 - 4: half of 8
                rows.push(`${a} − ${b}`);
                rows.push(`${a} = 2 × ${b}`);
                rows.push(`→ half of ${a}`);

            } else if (strategy === 'bonds' && op === '+') {
                rows.push(`${a} + ${b}`);
                rows.push(`→ bond to 10`);

            } else if (strategy === 'bonds' && op === '-') {
                rows.push(`${a} − ${b}`);
                rows.push(`${b} + ? = ${a}`);

            } else if (strategy === 'near-doubles' && op === '+') {
                const smaller = Math.min(a, b);
                const diff = a + b - 2 * smaller;
                rows.push(`${a} + ${b}`);
                rows.push(`→ 2 × ${smaller} + ${diff}`);
                rows.push(`= ${2 * smaller} + ${diff}`);

            } else if (strategy === 'near-doubles' && op === '-') {
                // e.g. 7 - 3: near-double because 3+3=6, 7 = 6+1
                const half = Math.floor(a / 2);
                const rem = a - 2 * half;
                rows.push(`${a} − ${b}`);
                rows.push(`${a} ≈ 2 × ${half}${rem > 0 ? ' + ' + rem : ''}`);
                rows.push(`${b} ≈ ${half}`);

            } else if (strategy === 'recall') {
                rows.push(`${a} ${op === '+' ? '+' : '−'} ${b}`);
                rows.push(`→ commit to memory`);
                if (op === '-') rows.push(`${b} + ${answer} = ${a}`);

            // ── MULTI-DIGIT STRATEGIES ─────────────────────────────────
            } else if (strategy === 'partitioning' && op === '+') {
                const pA = placeValues(a), pB = placeValues(b);
                const breaks = [], sums = [];
                if (pA.h > 0 || pB.h > 0) { breaks.push(`(${pA.h} + ${pB.h})`); sums.push(pA.h + pB.h); }
                if (pA.t > 0 || pB.t > 0) { breaks.push(`(${pA.t} + ${pB.t})`); sums.push(pA.t + pB.t); }
                breaks.push(`(${pA.o} + ${pB.o})`); sums.push(pA.o + pB.o);
                rows.push(`${a} + ${b}`);
                rows.push(`= ${breaks.join(' + ')}`);
                rows.push(`= ${sums.join(' + ')}`);

            } else if (strategy === 'partitioning' && op === '-') {
                const pA = placeValues(a), pB = placeValues(b);
                const breaks = [], diffs = [];
                if (pA.h > 0 || pB.h > 0) { breaks.push(`(${pA.h} − ${pB.h})`); diffs.push(pA.h - pB.h); }
                if (pA.t > 0 || pB.t > 0) { breaks.push(`(${pA.t} − ${pB.t})`); diffs.push(pA.t - pB.t); }
                breaks.push(`(${pA.o} − ${pB.o})`); diffs.push(pA.o - pB.o);
                rows.push(`${a} − ${b}`);
                rows.push(`= ${breaks.join(' + ')}`);
                rows.push(`= ${diffs.join(' + ')}`);

            } else if (strategy === 'compensating' && op === '+') {
                const roundUp = Math.ceil(b / 10) * 10;
                const diff = roundUp - b;
                rows.push(`${a} + ${b}`);
                rows.push(`→ ${a} + ${roundUp} − ${diff}`);
                rows.push(`= ${a + roundUp} − ${diff}`);

            } else if (strategy === 'compensating' && op === '-') {
                const roundUp = Math.ceil(b / 10) * 10;
                const diff = roundUp - b;
                rows.push(`${a} − ${b}`);
                rows.push(`→ ${a} − ${roundUp} + ${diff}`);
                rows.push(`= ${a - roundUp} + ${diff}`);

            } else if (strategy === 'doubling') {
                const smaller = Math.min(a, b);
                const diff = (a + b) - 2 * smaller;
                rows.push(`${a} + ${b}`);
                if (diff === 0) {
                    rows.push(`→ 2 × ${smaller}`);
                } else {
                    rows.push(`→ 2 × ${smaller} + ${diff}`);
                    rows.push(`= ${2 * smaller} + ${diff}`);
                }

            } else if (strategy === 'halving') {
                const half = a / 2;
                const delta = b - half;
                rows.push(`${a} − ${b}`);
                rows.push(`${a} ÷ 2 = ${half}`);
                if (delta > 0) {
                    rows.push(`${b} = ${half} + ${delta}`);
                    rows.push(`→ ${half} − ${delta}`);
                } else if (delta < 0) {
                    rows.push(`${b} = ${half} − ${Math.abs(delta)}`);
                    rows.push(`→ ${half} + ${Math.abs(delta)}`);
                }
            }

            const stepsHTML = rows.map(r => `<div class="mc-step">${r}</div>`).join('');
            return `<div class="mc-strategy-label">${strategyName}</div>
                    <hr class="mc-fact-divider">
                    ${stepsHTML}
                    <div class="mc-step answer">= <strong>${answer}</strong></div>`;
        }

        // ── HINT TEXT (shown on "Show hint" click, before submission) ───

        function getHintText(fact) {
            const { a, b, op, strategy } = fact;
            switch (strategy) {
                case 'doubles':
                    return op === '+' ? `Double ${a}` : `Half of ${a}`;
                case 'bonds':
                    return op === '+' ? `${a} and ${b} make 10` : `${b} + ? = ${a}`;
                case 'near-doubles': {
                    const smaller = op === '+' ? Math.min(a, b) : Math.floor(a / 2);
                    const diff = op === '+' ? (a + b - 2 * smaller) : (a - 2 * smaller);
                    return op === '+'
                        ? `Near double: 2 × ${smaller} + ${diff}`
                        : `Near half: ${a} ÷ 2 ≈ ${smaller}`;
                }
                case 'recall':
                    return op === '+' ? `${a} + ${b} — know it cold` : `${b} + ? = ${a}`;
                case 'partitioning':
                    return `Partition: split each number into place values`;
                case 'compensating': {
                    const roundUp = Math.ceil(b / 10) * 10;
                    const diff = roundUp - b;
                    return op === '+'
                        ? `Round ${b} → ${roundUp}, then subtract ${diff}`
                        : `Round ${b} → ${roundUp}, then add back ${diff}`;
                }
                case 'doubling': {
                    const smaller = Math.min(a, b);
                    const diff = (a + b) - 2 * smaller;
                    return diff === 0 ? `Double ${smaller}` : `Double ${smaller}, then add ${diff}`;
                }
                case 'halving': {
                    const half = a / 2;
                    const delta = b - half;
                    return `${a} ÷ 2 = ${half} — ${b} is ${half} ${delta >= 0 ? '+' : '−'} ${Math.abs(delta)}`;
                }
            }
            return '';
        }

        // ── FLOW ────────────────────────────────────────────────────────

        function setMode(mode) {
            window.idleQuestionValue = mode === 'singles' ? 0.1 : 2;
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn =>
                btn.classList.toggle('active', btn.dataset.mode === mode)
            );
            const q = { singles: '? + ?', add: '? + ?', sub: '? − ?', mix: '? + ?' };
            document.getElementById('question').textContent = q[mode] || '? + ?';
            startFresh();
        }

        function updateTimerLabel(val) {
            document.getElementById('mc-timer-label').textContent = val + 's';
            mcDur = parseInt(val) * 1000;
        }

        function setSessionSize(n) {
            sessionSize = n;
            [['sess-full', 0], ['sess-25', 25], ['sess-50', 50]].forEach(([id, val]) => {
                const el = document.getElementById(id);
                el.classList.toggle('sess-active', n === val);
                el.style.fontWeight = n === val ? '600' : '';
            });
            startFresh();
        }

        function startFresh() {
            drillStart = Date.now();
            let pool;
            if (currentMode === 'singles') {
                pool = shuffle(buildSingleFacts());
            } else {
                const allFacts = buildAllFacts();
                pool = shuffle(allFacts.filter(f => {
                    if (currentMode === 'add') return f.op === '+';
                    if (currentMode === 'sub') return f.op === '-';
                    return true; // mix
                }));
            }
            if (sessionSize > 0) pool = pool.slice(0, sessionSize);
            queue = [...pool];
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0;
            total = queue.length;
            document.getElementById('done-screen').style.display = 'none';
            document.getElementById('drill-screen').style.display = 'block';
            updateStats(); nextQuestion();
        }

        function drillMissed() {
            const mf = Object.keys(missed).map(k => missed[k].fact);
            if (!mf.length) return;
            drillStart = Date.now();
            queue = shuffle([...mf, ...mf]);
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0;
            total = queue.length;
            document.getElementById('done-screen').style.display = 'none';
            document.getElementById('drill-screen').style.display = 'block';
            updateStats(); nextQuestion();
        }

        function nextQuestion() {
            clearMC();
            if (!queue.length) { showDone(); return; }
            current = queue.pop();
            const opSym = current.op === '+' ? '+' : '−';
            document.getElementById('question').textContent = `${current.a} ${opSym} ${current.b}`;
            document.getElementById('hint-text').textContent = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            const inp = document.getElementById('answer-input');
            inp.value = ''; inp.className = 'answer-input'; inp.focus();
            updateProgress(); updateMissed();
            startMCTimer();
        }

        function clearMC() {
            _clearTimer();
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('mc-hint').textContent = '';
        }

        function dismissMC() {
            if (!mcVisible) return;
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('answer-input').focus();
        }

        function showMC() {
            if (!current) return;
            const opSym = current.op === '+' ? '+' : '−';
            const label = mcDur > 2500
                ? `yeah — ${current.a} ${opSym} ${current.b}`
                : `hint — ${current.a} ${opSym} ${current.b}`;
            document.getElementById('mc-label').textContent = label;
            document.getElementById('mc-content').innerHTML = buildMCContent(current);
            document.getElementById('mc-hint').textContent = '';
            mcVisible = true;
            document.getElementById('mc-overlay').classList.add('visible');
            document.getElementById('answer-input').focus();
        }

        function showHint() {
            if (current) document.getElementById('hint-text').textContent = getHintText(current);
        }

        function submitAnswer() {
            if (!current) return;
            if (mcVisible) { dismissMC(); return; }
            clearMC();
            const inp = document.getElementById('answer-input');
            const val = parseInt(inp.value);
            if (isNaN(val)) return;
            const ans = current.answer;
            const key = `${current.a}${current.op}${current.b}`;

            if (val === ans) {
                inp.className = 'answer-input correct';
                document.getElementById('feedback').textContent = streak >= 4 ? `${streak + 1} in a row` : 'Correct';
                document.getElementById('feedback').className = 'feedback correct';
                correct++; streak++; doneCount++;
                if (missed[key]) { missed[key].count--; if (missed[key].count <= 0) delete missed[key]; }
                updateStats();
                setTimeout(nextQuestion, 600);
            } else {
                inp.className = 'answer-input wrong';
                document.getElementById('feedback').textContent = `The answer is ${ans}`;
                document.getElementById('feedback').className = 'feedback wrong';
                wrong++; streak = 0;
                if (!missed[key]) missed[key] = { fact: current, count: 0 };
                missed[key].count++;
                queue.unshift(current);
                updateStats();
                showMC();
                setTimeout(() => {
                    inp.value = ''; inp.className = 'answer-input';
                    document.getElementById('feedback').textContent = '';
                    document.getElementById('feedback').className = 'feedback';
                }, 500);
            }
        }

        function updateMissed() {
            const keys = Object.keys(missed);
            const sec = document.getElementById('missed-section');
            if (!keys.length) { sec.style.display = 'none'; return; }
            sec.style.display = 'block';
            document.getElementById('missed-pills').innerHTML = keys.map(k => {
                const f = missed[k].fact;
                const op = f.op === '+' ? '+' : '−';
                return `<span class="missed-pill">${f.a} ${op} ${f.b} = ${f.answer}</span>`;
            }).join('');
        }

        function showDone() {
            clearMC();
            document.getElementById('drill-screen').style.display = 'none';
            document.getElementById('done-screen').style.display = 'flex';
            const elapsed = drillStart ? Date.now() - drillStart : 0;
            const timeStr = fmtDrillTime(elapsed);
            const sessionLabel = sessionSize === 0 ? 'Full' : String(sessionSize);
            const t = correct + wrong;
            const pct = t > 0 ? Math.round((correct / t) * 100) : 0;
            const spm = elapsed > 0 ? Math.round(t / (elapsed / 60000)) : 0;
            document.getElementById('done-title').textContent = pct >= 90 ? 'Excellent.' : pct >= 70 ? 'Good progress.' : 'Keep going.';
            document.getElementById('done-sub').textContent = `${correct} correct, ${wrong} missed — ${pct}% accuracy`;
            document.getElementById('done-time').textContent = timeStr + ' · ' + sessionLabel;
            document.getElementById('missed-only-btn').style.display = Object.keys(missed).length ? 'inline-block' : 'none';
            const hist = saveDrillResult('history_addsub_' + currentMode, pct, timeStr, sessionLabel, spm);
            document.getElementById('done-history').innerHTML = renderDrillHistory(hist);
        }

        document.getElementById('answer-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') submitAnswer();
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') return;
            if (mcVisible) dismissMC();
        });

        startFresh();
    </script>
