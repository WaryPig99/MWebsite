<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Times Tables — Division</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600&family=EB+Garamond:wght@400&family=Libre+Baskerville:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #faf9f7;
            font-family: 'EB Garamond', serif;
            color: #1a1916;
            position: fixed;
            width: 100%;
        }

        /* HUD — hairline strip, gets out of the way */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 14px;
            border-bottom: 0.5px solid #e0ddd8;
            background: #faf9f7;
            z-index: 10;
        }

        #hud-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: #aaa69e;
        }

        #hud-stats {
            display: flex;
            gap: 12px;
            font-size: 10px;
            color: #aaa69e;
            letter-spacing: .06em;
            text-transform: uppercase;
        }

            #hud-stats span b {
                font-family: 'Libre Baskerville', serif;
                font-size: 12px;
                font-weight: 700;
                color: #1a1916;
                margin-right: 1px;
            }

        #mc-setting {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #c8c4bc;
            letter-spacing: .04em;
        }

            #mc-setting input[type=range] {
                width: 48px;
                accent-color: #1a1916;
            }

        #mc-val {
            font-size: 10px;
            color: #aaa69e;
            min-width: 18px;
        }

        /* progress hairline */
        #prog-wrap {
            position: fixed;
            top: 29px;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0ddd8;
            z-index: 10;
        }

        #prog-fill {
            height: 100%;
            background: #1a1916;
            width: 0%;
            transition: width .4s ease;
        }

        /* STAGE — the whole screen below HUD */
        #stage {
            position: fixed;
            top: 30px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.4rem 0.8rem;
            gap: 0;
        }

        #question {
            font-family: 'Libre Baskerville', serif;
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            text-align: center;
            margin-bottom: 8px;
        }

        #hint-text {
            font-size: 13px;
            color: #8a8680;
            font-style: italic;
            text-align: center;
            min-height: 18px;
            margin-bottom: 16px;
        }

        #timer-wrap {
            width: 100%;
            height: 1px;
            background: #e0ddd8;
            margin-bottom: 16px;
        }

        #timer-fill {
            height: 100%;
            background: #c8a060;
            width: 100%;
        }

        #input-row {
            width: 100%;
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        #answer-input {
            flex: 1;
            min-width: 0;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            background: #fff;
            font-family: 'Libre Baskerville', serif;
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            color: #1a1916;
            padding: 13px 8px;
            outline: none;
            -webkit-appearance: none;
            transition: border-color .15s;
        }

            #answer-input.correct {
                border-color: #3a7d5e;
                color: #3a7d5e;
            }

            #answer-input.wrong {
                border-color: #b84040;
                color: #b84040;
            }

        #submit-btn {
            flex-shrink: 0;
            width: 56px;
            background: #1a1916;
            color: #faf9f7;
            border: none;
            border-radius: 2px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            cursor: pointer;
        }

            #submit-btn:active {
                opacity: .7;
            }

        #feedback {
            font-size: 13px;
            font-style: italic;
            text-align: center;
            min-height: 18px;
            color: #8a8680;
        }

            #feedback.correct {
                color: #3a7d5e;
            }

            #feedback.wrong {
                color: #b84040;
            }

        #hint-btn {
            margin-top: 10px;
            background: transparent;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            padding: 4px 14px;
            font-family: 'EB Garamond', serif;
            font-size: 11px;
            color: #8a8680;
            text-transform: uppercase;
            letter-spacing: .1em;
            cursor: pointer;
        }

        /* MORON CHECKER — completely isolated fixed overlay */
        #mc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(250,249,247,0.88);
            backdrop-filter: blur(4px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

            #mc-overlay.visible {
                display: flex;
            }

        #mc-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .2em;
            color: #8a8680;
            margin-bottom: 12px;
        }

        #mc-grid-wrap {
            overflow: auto;
            max-width: 100%;
            max-height: 55vh;
            -webkit-overflow-scrolling: touch;
        }

        .mc-grid {
            border-collapse: collapse;
            font-family: 'Libre Baskerville', serif;
            width: max-content;
        }

            .mc-grid td {
                width: 28px;
                height: 28px;
                text-align: center;
                font-size: 11px;
                border: 0.5px solid rgba(200,196,188,0.35);
                color: rgba(100,96,90,0.28);
            }

                .mc-grid td.mc-header {
                    font-size: 10px;
                    color: rgba(160,156,148,0.38);
                    background: rgba(245,244,241,0.5);
                    font-style: italic;
                }

                .mc-grid td.mc-highlight {
                    background: #1a1916;
                    color: #faf9f7;
                    font-size: 14px;
                    font-weight: 700;
                }

                .mc-grid td.mc-row-header, .mc-grid td.mc-col-header {
                    background: rgba(238,236,234,0.85);
                    color: #1a1916;
                    font-weight: 500;
                }

        #mc-dismiss {
            margin-top: 14px;
            font-size: 10px;
            color: #aaa69e;
            letter-spacing: .14em;
            text-transform: uppercase;
            font-style: italic;
        }

        /* DONE */
        #done-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #faf9f7;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

            #done-screen.visible {
                display: flex;
            }

        #done-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        #done-sub {
            font-size: 15px;
            color: #8a8680;
            font-style: italic;
            margin-bottom: 2rem;
        }

        .done-btn {
            width: 100%;
            max-width: 260px;
            padding: 13px;
            margin-bottom: 10px;
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            letter-spacing: .1em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
        }

        #restart-btn {
            background: #1a1916;
            color: #faf9f7;
            border: none;
        }

        #missed-btn {
            background: transparent;
            border: 0.5px solid #c8c4bc;
            color: #1a1916;
            display: none;
        }

        #done-time {
            font-size: 15px;
            color: #8a8680;
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        #done-history {
            margin-top: 1.5rem;
            text-align: center;
        }

        .done-history-label {
            font-family: 'EB Garamond', serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .14em;
            color: #c8c4bc;
            margin-bottom: 6px;
        }

        .done-history-row {
            font-size: 13px;
            color: #aaa69e;
            font-style: italic;
            margin: 2px 0;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="hud-title">
            <a href="mobile.html" style="text-decoration:none;color:#c8c4bc;font-family:'EB Garamond',serif;font-size:10px;letter-spacing:.12em;">× multiply</a>
        </div>
        <div id="hud-stats">
            <span><b id="s-correct">0</b>ok</span>
            <span><b id="s-wrong">0</b>miss</span>
            <span><b id="s-streak">0</b>run</span>
        </div>
        <div id="mc-setting">
            <input type="range" id="mc-range" min="3" max="15" value="5" step="1" oninput="updateTimer(this.value)">
            <span id="mc-val">5s</span>
        </div>
    </div>

    <div id="prog-wrap"><div id="prog-fill"></div></div>

    <div id="stage">
        <div id="question">?÷?</div>
        <div id="hint-text"></div>
        <div id="timer-wrap"><div id="timer-fill"></div></div>
        <div id="input-row">
            <input id="answer-input" type="number" inputmode="numeric" placeholder="—" autocomplete="off">
            <button id="submit-btn">→</button>
        </div>
        <div id="feedback"></div>
        <button id="hint-btn">Hint</button>
    </div>

    <div id="mc-overlay" tabindex="-1">
        <div id="mc-label"></div>
        <div id="mc-grid-wrap"><table class="mc-grid" id="mc-grid"></table></div>
        <div id="mc-dismiss">Tap or type to dismiss</div>
    </div>

    <div id="done-screen">
        <div id="done-title"></div>
        <div id="done-sub"></div>
        <div id="done-time"></div>
        <button class="done-btn" id="restart-btn">Full drill again</button>
        <button class="done-btn" id="missed-btn">Missed only</button>
        <div id="done-history"></div>
    </div>

    <script>
        const HINTS = {
            '2': n => `${n}+${n}`,
            '3': n => `3×${n - 1}+${n} = ${3 * (n - 1)}+${n}`,
            '4': n => `Double ${n}, double again`,
            '5': n => `Ends in 0 or 5`,
            '6': n => `5×${n}+${n} = ${5 * n}+${n}`,
            '7': n => `5×${n}+2×${n} = ${5 * n}+${2 * n}`,
            '8': n => `Double, double, double`,
            '9': n => `10×${n}−${n} = ${10 * n}−${n}`,
            '10': n => `Just add a zero`,
            '11': n => n <= 9 ? `Repeat the digit — ${n}${n}` : `10×${n}+${n}`,
            '12': n => `10×${n}+2×${n} = ${10 * n}+${2 * n}`,
        };

        function buildTable() {
            let f = [];
            for (let a = 2; a <= 12; a++) for (let b = a; b <= 12; b++) f.push([a, b]);
            return f;
        }

        let allFacts = buildTable(), queue = [], missed = {};
        let correct = 0, wrong = 0, streak = 0, current = null, total = 0, doneCount = 0;
        let drillStart = null;
        let mcTimer = null, mcFrame = null, mcStart = null, mcDur = 5000, mcVisible = false;

        function updateTimer(v) { document.getElementById('mc-val').textContent = v + 's'; mcDur = parseInt(v) * 1000; }
        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

        function startFresh() {
            drillStart = Date.now();
            queue = shuffle([...allFacts]);
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0; total = queue.length;
            document.getElementById('done-screen').classList.remove('visible');
            updateStats(); nextQ();
        }

        function drillMissed() {
            const mf = Object.keys(missed).map(k => missed[k].fact);
            if (!mf.length) return;
            drillStart = Date.now();
            queue = shuffle([...mf, ...mf]);
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0; total = queue.length;
            document.getElementById('done-screen').classList.remove('visible');
            updateStats(); nextQ();
        }

        function nextQ() {
            clearMC();
            if (!queue.length) { showDone(); return; }
            const flip = Math.random() > .5;
            const [a, b] = queue.pop();
            // current = [knownFactor, unknownFactor]
            // Question: (knownFactor × unknownFactor) ÷ knownFactor = ?
            current = flip ? [b, a] : [a, b];
            document.getElementById('question').textContent = `${current[0] * current[1]}÷${current[0]}`;
            document.getElementById('hint-text').textContent = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = '';
            const inp = document.getElementById('answer-input');
            inp.value = ''; inp.className = ''; inp.focus();
            updateProgress(); startMCTimer();
        }

        let _timerGen = 0, _timerTimeout = null, _timerRaf = null, _timerStart = null;

        function startMCTimer() {
            _clearTimer();
            const gen = ++_timerGen;
            _timerStart = performance.now();
            function tick(now) {
                if (_timerGen !== gen) return;
                const pct = Math.max(0, 1 - (now - _timerStart) / mcDur);
                document.getElementById('timer-fill').style.width = (pct * 100) + '%';
                if (pct > 0) _timerRaf = requestAnimationFrame(tick);
            }
            _timerRaf = requestAnimationFrame(tick);
            _timerTimeout = setTimeout(() => {
                if (_timerGen !== gen) return;
                showMC();
            }, mcDur);
        }

        function _clearTimer() {
            _timerGen++;
            if (_timerTimeout) { clearTimeout(_timerTimeout); _timerTimeout = null; }
            if (_timerRaf)     { cancelAnimationFrame(_timerRaf); _timerRaf = null; }
            _timerStart = null;
            document.getElementById('timer-fill').style.width = '100%';
        }

        function clearMC() {
            _clearTimer();
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
        }

        function dismissMC() {
            if (!mcVisible) return;
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('answer-input').focus();
        }

        function showMC() {
            if (!current) return;
            const [qa, qb] = current;
            const product = qa * qb;
            document.getElementById('mc-label').textContent = mcDur > 2500 ? `yeah — ${product}÷${qa}` : `moron checker — ${product}÷${qa}`;
            buildGrid(qa, qb);
            mcVisible = true;
            document.getElementById('mc-overlay').classList.add('visible');
            document.getElementById('answer-input').focus();
            setTimeout(() => {
                const hl = document.querySelector('.mc-highlight');
                const wrap = document.getElementById('mc-grid-wrap');
                if (hl && wrap) {
                    wrap.scrollLeft = hl.offsetLeft - wrap.clientWidth / 2 + hl.offsetWidth / 2;
                    wrap.scrollTop = hl.offsetTop - wrap.clientHeight / 2 + hl.offsetHeight / 2;
                }
            }, 40);
        }

        function buildGrid(qa, qb) {
            const table = document.getElementById('mc-grid');
            table.innerHTML = '';
            const cols = [];
            for (let c = 2; c <= 12; c++) cols.push(c);
            const hr = document.createElement('tr');
            const corner = document.createElement('td');
            corner.className = 'mc-header'; corner.textContent = '×'; hr.appendChild(corner);
            for (const c of cols) { const th = document.createElement('td'); th.textContent = c; th.className = c === qb ? 'mc-highlight' : 'mc-header'; hr.appendChild(th); }
            table.appendChild(hr);
            for (let r = 2; r <= 12; r++) {
                const tr = document.createElement('tr');
                const rh = document.createElement('td'); rh.textContent = r; rh.className = r === qa ? 'mc-row-header' : 'mc-header'; tr.appendChild(rh);
                for (const c of cols) {
                    const td = document.createElement('td'); td.textContent = r * c;
                    if (r === qa && c === qb) { td.style.background = '#c8a060'; td.style.color = '#fff'; td.style.fontWeight = '700'; }
                    else if (r === qa || c === qb) { td.style.background = 'rgba(245,240,232,0.9)'; td.style.color = '#9a8060'; }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function getHint(a, b) { const key = String(Math.min(a, b)), other = Math.max(a, b); return HINTS[key] ? HINTS[key](other) : `${a}×${b}=${a * b}`; }

        function submit() {
            if (!current) return;
            if (mcVisible) { dismissMC(); return; }
            clearMC();
            const inp = document.getElementById('answer-input');
            const val = parseInt(inp.value);
            if (isNaN(val)) return;
            const ans = current[1]; // the unknown factor
            const key = current[0] + '÷' + current[1];

            if (val === ans) {
                inp.className = 'correct';
                document.getElementById('feedback').textContent = streak >= 4 ? `${streak + 1} in a row` : 'Correct';
                document.getElementById('feedback').className = 'correct';
                correct++; streak++; doneCount++;
                if (missed[key]) { missed[key].count--; if (missed[key].count <= 0) delete missed[key]; }
                updateStats(); setTimeout(nextQ, 500);
            } else {
                inp.className = 'wrong';
                document.getElementById('feedback').textContent = `${ans} — ${getHint(current[0], current[1])}`;
                document.getElementById('feedback').className = 'wrong';
                wrong++; streak = 0;
                if (!missed[key]) missed[key] = { fact: current, count: 0 };
                missed[key].count++;
                queue.unshift(current);
                updateStats(); showMC();
                setTimeout(() => { inp.value = ''; inp.className = ''; document.getElementById('feedback').textContent = ''; document.getElementById('feedback').className = ''; }, 500);
            }
        }

        function updateStats() {
            document.getElementById('s-correct').textContent = correct;
            document.getElementById('s-wrong').textContent = wrong;
            document.getElementById('s-streak').textContent = streak;
        }
        function updateProgress() {
            const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
            document.getElementById('prog-fill').style.width = pct + '%';
        }
        function fmtDrillTime(ms) {
            const s = Math.round(ms / 1000);
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function saveDrillResult(key, pct, timeStr) {
            let hist = [];
            try { hist = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) {}
            const d = new Date();
            hist.unshift({ date: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), accuracy: pct, time: timeStr });
            if (hist.length > 5) hist.length = 5;
            try { localStorage.setItem(key, JSON.stringify(hist)); } catch(e) {}
            return hist;
        }

        function renderDrillHistory(hist) {
            if (!hist.length) return '';
            return '<div class="done-history"><div class="done-history-label">Recent</div>'
                + hist.map(r => `<div class="done-history-row">${r.date} &middot; ${r.accuracy}% &middot; ${r.time}</div>`).join('')
                + '</div>';
        }

        function showDone() {
            clearMC();
            const elapsed = drillStart ? Date.now() - drillStart : 0;
            const timeStr = fmtDrillTime(elapsed);
            const t = correct + wrong, pct = t > 0 ? Math.round((correct / t) * 100) : 0;
            document.getElementById('done-title').textContent = pct >= 90 ? 'Excellent.' : pct >= 70 ? 'Good progress.' : 'Keep going.';
            document.getElementById('done-sub').textContent = `${correct} correct, ${wrong} missed — ${pct}%`;
            document.getElementById('done-time').textContent = timeStr;
            document.getElementById('missed-btn').style.display = Object.keys(missed).length ? 'block' : 'none';
            const hist = saveDrillResult('history_divide', pct, timeStr);
            document.getElementById('done-history').innerHTML = renderDrillHistory(hist);
            document.getElementById('done-screen').classList.add('visible');
        }

        document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
        document.addEventListener('keydown', e => { if (e.key === 'Enter') return; if (mcVisible) dismissMC(); });
        document.getElementById('mc-overlay').addEventListener('click', dismissMC);
        document.getElementById('submit-btn').addEventListener('click', submit);
        document.getElementById('hint-btn').addEventListener('click', () => { if (current) document.getElementById('hint-text').textContent = getHint(current[0], current[1]); });
        document.getElementById('restart-btn').addEventListener('click', startFresh);
        document.getElementById('missed-btn').addEventListener('click', drillMissed);

        // Keep stage pinned below HUD regardless of keyboard height
        function fitStage() {
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const stage = document.getElementById('stage');
            stage.style.height = (vh - 30) + 'px';
            stage.style.bottom = 'auto';
        }
        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', fitStage);
        }
        fitStage();

        startFresh();
    </script>
</body>
</html>
