<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-visual">
    <title>Times Tables — Division</title>
    <script>try{if(localStorage.getItem('dark')==='1')document.documentElement.classList.add('dark');}catch(e){}</script>
    <link rel="stylesheet" href="shared.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #faf9f7;
            font-family: 'EB Garamond', serif;
            color: #1a1916;
            position: fixed;
            width: 100%;
        }
        html.dark body { background: #0d0f12; color: #c8c4bc; }

        /* ── TOP BAR ─────────────────────────────────────────────────────── */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            background: #faf9f7;
            border-bottom: 0.5px solid #e0ddd8;
            z-index: 300;
        }
        html.dark #topbar { background: #0d0f12; border-bottom-color: #252830; }

        #mode-btn {
            background: none;
            border: none;
            padding: 4px 0;
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: #aaa69e;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 7px;
            line-height: 1;
        }
        #mode-btn:active { color: #1a1916; }
        html.dark #mode-btn { color: #6a6660; }
        html.dark #mode-btn:active { color: #c8c4bc; }

        #topbar-dark {
            background: none;
            border: none;
            padding: 4px 0;
            font-size: 16px;
            color: #aaa69e;
            cursor: pointer;
            user-select: none;
            line-height: 1;
        }
        html.dark #topbar-dark { color: #6a6660; }

        /* ── MODE DROPDOWN ───────────────────────────────────────────────── */
        #menu-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 280;
        }
        #menu-backdrop.open { display: block; }

        #mode-menu {
            position: fixed;
            top: 44px;
            left: 0;
            min-width: 192px;
            background: #faf9f7;
            border: 0.5px solid #e0ddd8;
            border-top: none;
            z-index: 290;
            display: none;
        }
        html.dark #mode-menu { background: #0d0f12; border-color: #252830; }

        #mode-menu.open {
            display: block;
            animation: menu-drop .14s ease;
        }
        @keyframes menu-drop {
            from { opacity: 0; transform: translateY(-5px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .mode-item {
            display: flex;
            align-items: baseline;
            gap: 11px;
            padding: 13px 18px;
            font-family: 'EB Garamond', serif;
            font-size: 15px;
            letter-spacing: .04em;
            color: #8a8680;
            text-decoration: none;
            border-bottom: 0.5px solid #e0ddd8;
        }
        .mode-item:last-child { border-bottom: none; }
        .mode-item:active { background: #f0ede8; }
        html.dark .mode-item { color: #6a6660; border-bottom-color: #252830; }
        html.dark .mode-item:active { background: #13161a; }

        .mode-item.current {
            color: #1a1916;
        }
        html.dark .mode-item.current { color: #faf9f7; }

        .mode-sym {
            font-family: 'Libre Baskerville', serif;
            font-weight: 700;
            font-size: 14px;
            width: 14px;
            text-align: center;
            flex-shrink: 0;
            color: #c8c4bc;
        }
        .mode-item.current .mode-sym { color: #1a1916; }
        html.dark .mode-sym { color: #3d4148; }
        html.dark .mode-item.current .mode-sym { color: #faf9f7; }

        /* ── PROGRESS HAIRLINE ───────────────────────────────────────────── */
        #prog-wrap {
            position: fixed;
            top: 44px; left: 0; right: 0;
            height: 1px;
            background: #e0ddd8;
            z-index: 10;
        }
        html.dark #prog-wrap { background: #252830; }

        #prog-fill {
            height: 100%;
            background: #1a1916;
            width: 0%;
            transition: width .4s ease;
        }
        html.dark #prog-fill { background: #c8c4bc; }

        /* ── QUESTION AREA ───────────────────────────────────────────────── */
        #question-area {
            position: fixed;
            top: 45px;
            left: 0; right: 0;
            /* bottom set dynamically by fitLayout() */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 1.5rem;
        }

        #question {
            font-family: 'Libre Baskerville', serif;
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            text-align: center;
            color: #1a1916;
        }
        html.dark #question { color: #faf9f7; }

        #feedback {
            font-size: 14px;
            font-style: italic;
            text-align: center;
            min-height: 20px;
            margin-top: 12px;
            color: #8a8680;
            letter-spacing: .02em;
        }
        #feedback.correct { color: #3a7d5e; }
        #feedback.wrong   { color: #b84040; }
        html.dark #feedback { color: #6a6660; }

        /* ── INPUT ROW (pinned above keyboard) ───────────────────────────── */
        #input-row {
            position: fixed;
            left: 0; right: 0;
            /* bottom set dynamically by fitLayout() */
            padding: 10px 14px 12px;
            display: flex;
            gap: 8px;
            background: #faf9f7;
            border-top: 0.5px solid #e0ddd8;
            z-index: 20;
        }
        html.dark #input-row { background: #0d0f12; border-top-color: #252830; }

        #answer-input {
            flex: 1;
            min-width: 0;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            background: #fff;
            font-family: 'Libre Baskerville', serif;
            font-size: 30px;
            font-weight: 700;
            text-align: center;
            color: #1a1916;
            padding: 13px 8px;
            outline: none;
            -webkit-appearance: none;
            transition: border-color .15s;
        }
        #answer-input:focus    { border-color: #1a1916; }
        #answer-input.correct  { border-color: #3a7d5e; color: #3a7d5e; }
        #answer-input.wrong    { border-color: #b84040; color: #b84040; }
        html.dark #answer-input            { background: #13161a; border-color: #252830; color: #faf9f7; }
        html.dark #answer-input:focus      { border-color: #c8c4bc; }
        html.dark #answer-input.correct    { border-color: #3a7d5e; color: #3a7d5e; }
        html.dark #answer-input.wrong      { border-color: #b84040; color: #b84040; }

        #submit-btn {
            flex-shrink: 0;
            width: 56px;
            background: #1a1916;
            color: #faf9f7;
            border: none;
            border-radius: 2px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            cursor: pointer;
        }
        #submit-btn:active { opacity: .7; }
        html.dark #submit-btn { background: #c8c4bc; color: #0d0f12; }

        /* ── MC OVERLAY ──────────────────────────────────────────────────── */
        /* bottom is set dynamically by fitLayout() to stay above the keyboard */
        #mc-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            background: rgba(250,249,247,0.88);
            backdrop-filter: blur(4px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #mc-overlay.visible { display: flex; }
        html.dark #mc-overlay { background: rgba(13,15,18,0.92); }

        #mc-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .2em;
            color: #8a8680;
            margin-bottom: 12px;
        }
        html.dark #mc-label { color: #6a6660; }

        #mc-grid-wrap {
            overflow: auto;
            max-width: 100%;
            max-height: calc(100% - 84px); /* leave room for label + hint + dismiss */
            -webkit-overflow-scrolling: touch;
        }

        #mc-hint {
            margin-top: 10px;
            font-size: 12px;
            font-style: italic;
            color: #c8a060;
            letter-spacing: .04em;
            text-align: center;
        }

        #mc-dismiss {
            margin-top: 14px;
            font-size: 10px;
            color: #aaa69e;
            letter-spacing: .14em;
            text-transform: uppercase;
            font-style: italic;
        }
        html.dark #mc-dismiss { color: #6a6660; }

        /* ── DONE SCREEN ─────────────────────────────────────────────────── */
        #done-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #faf9f7;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        #done-screen.visible { display: flex; }
        html.dark #done-screen { background: #0d0f12; }

        #done-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        html.dark #done-title { color: #faf9f7; }

        #done-sub {
            font-size: 15px;
            color: #8a8680;
            font-style: italic;
            margin-bottom: 2rem;
        }
        html.dark #done-sub { color: #6a6660; }

        #done-time {
            font-size: 15px;
            color: #8a8680;
            font-style: italic;
            margin-bottom: 0.5rem;
        }
        html.dark #done-time { color: #6a6660; }

        .done-btn {
            width: 100%;
            max-width: 260px;
            padding: 13px;
            margin-bottom: 10px;
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            letter-spacing: .1em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
        }
        #restart-btn { background: #1a1916; color: #faf9f7; border: none; }
        html.dark #restart-btn { background: #c8c4bc; color: #0d0f12; }
        #missed-btn  { background: transparent; border: 0.5px solid #c8c4bc; color: #1a1916; display: none; }
        html.dark #missed-btn { border-color: #252830; color: #c8c4bc; }

        #done-history { margin-top: 1.5rem; text-align: center; }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div id="topbar">
        <button id="mode-btn" aria-label="Mode menu">☰ Mode</button>
        <button id="topbar-dark" onclick="toggleDark()" aria-label="Toggle dark mode">☽</button>
    </div>

    <!-- MODE DROPDOWN -->
    <div id="menu-backdrop"></div>
    <nav id="mode-menu" role="menu">
        <a href="mobile.html"           class="mode-item"         role="menuitem"><span class="mode-sym">×</span>Multiply</a>
        <a href="division-mobile.html"  class="mode-item current" role="menuitem"><span class="mode-sym">÷</span>Division</a>
        <a href="addsubtract-mobile.html" class="mode-item"       role="menuitem"><span class="mode-sym">+</span>Add / Sub</a>
        <a href="fractions-mobile.html" class="mode-item"         role="menuitem"><span class="mode-sym">½</span>Fractions</a>
    </nav>

    <!-- PROGRESS HAIRLINE -->
    <div id="prog-wrap"><div id="prog-fill"></div></div>

    <!-- QUESTION AREA -->
    <div id="question-area">
        <div id="question">?÷?</div>
        <div id="feedback"></div>
    </div>

    <!-- INPUT ROW -->
    <div id="input-row">
        <input id="answer-input" type="number" inputmode="numeric" placeholder="—" autocomplete="off">
        <button id="submit-btn">→</button>
    </div>

    <!-- Hidden DOM nodes required by shared.js -->
    <div id="timer-wrap" style="display:none"><div id="timer-fill"></div></div>
    <div id="hint-text"  style="display:none"></div>
    <span id="s-correct" style="display:none">0</span>
    <span id="s-wrong"   style="display:none">0</span>
    <span id="s-streak"  style="display:none">0</span>

    <!-- MORON CHECKER OVERLAY -->
    <div id="mc-overlay" tabindex="-1">
        <div id="mc-label"></div>
        <div id="mc-grid-wrap"><table class="mc-grid" id="mc-grid"></table></div>
        <div id="mc-hint"></div>
        <div id="mc-dismiss">Tap or type to dismiss</div>
    </div>

    <!-- DONE SCREEN -->
    <div id="done-screen">
        <div id="done-title"></div>
        <div id="done-sub"></div>
        <div id="done-time"></div>
        <button class="done-btn" id="restart-btn">Full drill again</button>
        <button class="done-btn" id="missed-btn">Missed only</button>
        <div id="done-history"></div>
    </div>

    <script src="shared.js"></script>
    <script>
        // ── DRILL LOGIC ────────────────────────────────────────────────────────

        function buildTable() {
            const f = [];
            for (let a = 2; a <= 12; a++) for (let b = a; b <= 12; b++) f.push([a, b]);
            return f;
        }

        let allFacts = buildTable(), queue = [], missed = {};
        let correct = 0, wrong = 0, streak = 0, current = null, total = 0, doneCount = 0;
        let drillStart = null;
        let mcVisible = false;

        function startFresh() {
            drillStart = Date.now();
            queue = shuffle([...allFacts]);
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0; total = queue.length;
            document.getElementById('done-screen').classList.remove('visible');
            updateStats(); nextQ();
        }

        function drillMissed() {
            const mf = Object.keys(missed).map(k => missed[k].fact);
            if (!mf.length) return;
            drillStart = Date.now();
            queue = shuffle([...mf, ...mf]);
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0; total = queue.length;
            document.getElementById('done-screen').classList.remove('visible');
            updateStats(); nextQ();
        }

        function nextQ() {
            clearMC();
            if (!queue.length) { showDone(); return; }
            const flip = Math.random() > .5;
            const [a, b] = queue.pop();
            // current = [knownFactor, unknownFactor]
            // Question: (knownFactor × unknownFactor) ÷ knownFactor = ?
            current = flip ? [b, a] : [a, b];
            document.getElementById('question').textContent = `${current[0] * current[1]}÷${current[0]}`;
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = '';
            const inp = document.getElementById('answer-input');
            inp.value = ''; inp.className = ''; inp.focus();
            updateProgress(); startMCTimer();
        }

        function clearMC() {
            _clearTimer();
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('mc-hint').textContent = '';
        }

        function dismissMC() {
            if (!mcVisible) return;
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('answer-input').focus();
        }

        function showMC() {
            if (!current) return;
            const [qa, qb] = current;
            const product = qa * qb;
            document.getElementById('mc-label').textContent = mcDur > 2500 ? `yeah — ${product}÷${qa}` : `moron checker — ${product}÷${qa}`;
            buildGrid(qa, qb);
            document.getElementById('mc-hint').textContent = getHint(qa, qb);
            mcVisible = true;
            document.getElementById('mc-overlay').classList.add('visible');
            document.getElementById('answer-input').focus();
            setTimeout(() => {
                const hl = document.querySelector('.mc-highlight');
                const wrap = document.getElementById('mc-grid-wrap');
                if (hl && wrap) {
                    wrap.scrollLeft = hl.offsetLeft - wrap.clientWidth / 2 + hl.offsetWidth / 2;
                    wrap.scrollTop  = hl.offsetTop  - wrap.clientHeight / 2 + hl.offsetHeight / 2;
                }
            }, 40);
        }

        function buildGrid(qa, qb) {
            const table = document.getElementById('mc-grid');
            table.innerHTML = '';
            const cols = [];
            for (let c = 2; c <= 12; c++) cols.push(c);
            const hr = document.createElement('tr');
            const corner = document.createElement('td');
            corner.className = 'mc-header'; corner.textContent = '×'; hr.appendChild(corner);
            for (const c of cols) {
                const th = document.createElement('td');
                th.textContent = c;
                th.className = (c === qb) ? 'mc-highlight' : 'mc-header';
                hr.appendChild(th);
            }
            table.appendChild(hr);
            for (let r = 2; r <= 12; r++) {
                const tr = document.createElement('tr');
                const rh = document.createElement('td');
                rh.textContent = r;
                rh.className = (r === qa) ? 'mc-row-header' : 'mc-header';
                tr.appendChild(rh);
                for (const c of cols) {
                    const td = document.createElement('td');
                    td.textContent = r * c;
                    if (r === qa && c === qb) {
                        td.style.background = '#c8a060';
                        td.style.color = '#fff';
                        td.style.fontWeight = '700';
                    } else if (r === qa || c === qb) {
                        const dark = document.documentElement.classList.contains('dark');
                        td.style.background = dark ? '#1e2228' : 'rgba(245,240,232,0.9)';
                        td.style.color      = dark ? '#6a6660' : '#9a8060';
                    }
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function getHint(a, b) {
            const key = String(Math.min(a, b)), other = Math.max(a, b);
            return HINTS[key] ? HINTS[key](other) : `${a}×${b}=${a * b}`;
        }

        function submit() {
            if (!current) return;
            if (mcVisible) { dismissMC(); return; }
            clearMC();
            const inp = document.getElementById('answer-input');
            const val = parseInt(inp.value);
            if (isNaN(val)) return;
            const ans = current[1]; // the unknown factor
            const key = current[0] + '÷' + current[1];

            if (val === ans) {
                inp.className = 'correct';
                document.getElementById('feedback').textContent = streak >= 4 ? `${streak + 1} in a row` : 'Correct';
                document.getElementById('feedback').className = 'correct';
                correct++; streak++; doneCount++;
                if (missed[key]) { missed[key].count--; if (missed[key].count <= 0) delete missed[key]; }
                updateStats(); setTimeout(nextQ, 500);
            } else {
                inp.className = 'wrong';
                document.getElementById('feedback').textContent = '';
                document.getElementById('feedback').className = 'wrong';
                wrong++; streak = 0;
                if (!missed[key]) missed[key] = { fact: current, count: 0 };
                missed[key].count++;
                queue.unshift(current);
                updateStats(); showMC();
                setTimeout(() => {
                    inp.value = ''; inp.className = '';
                    document.getElementById('feedback').textContent = '';
                    document.getElementById('feedback').className = '';
                }, 500);
            }
        }

        function showDone() {
            clearMC();
            const elapsed = drillStart ? Date.now() - drillStart : 0;
            const timeStr = fmtDrillTime(elapsed);
            const t = correct + wrong, pct = t > 0 ? Math.round((correct / t) * 100) : 0;
            document.getElementById('done-title').textContent = pct >= 90 ? 'Excellent.' : pct >= 70 ? 'Good progress.' : 'Keep going.';
            document.getElementById('done-sub').textContent   = `${correct} correct, ${wrong} missed — ${pct}%`;
            document.getElementById('done-time').textContent  = timeStr;
            document.getElementById('missed-btn').style.display = Object.keys(missed).length ? 'block' : 'none';
            const hist = saveDrillResult('history_divide', pct, timeStr, 'Full');
            document.getElementById('done-history').innerHTML = renderDrillHistory(hist);
            document.getElementById('done-screen').classList.add('visible');
        }

        // ── EVENT LISTENERS ────────────────────────────────────────────────────

        document.getElementById('answer-input').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
        document.addEventListener('keydown', e => { if (e.key === 'Enter') return; if (mcVisible) dismissMC(); });
        document.getElementById('mc-overlay').addEventListener('click', dismissMC);
        document.getElementById('submit-btn').addEventListener('click', submit);
        document.getElementById('restart-btn').addEventListener('click', startFresh);
        document.getElementById('missed-btn').addEventListener('click', drillMissed);

        // ── MODE MENU ──────────────────────────────────────────────────────────

        const modeBtn      = document.getElementById('mode-btn');
        const modeMenu     = document.getElementById('mode-menu');
        const menuBackdrop = document.getElementById('menu-backdrop');

        function openMenu() {
            modeMenu.classList.add('open');
            menuBackdrop.classList.add('open');
        }

        function closeMenu() {
            modeMenu.classList.remove('open');
            menuBackdrop.classList.remove('open');
            document.getElementById('answer-input').focus();
        }

        modeBtn.addEventListener('click', () => {
            modeMenu.classList.contains('open') ? closeMenu() : openMenu();
        });
        menuBackdrop.addEventListener('click', closeMenu);

        // ── VISUAL VIEWPORT LAYOUT ─────────────────────────────────────────────
        // Keeps input row pinned just above the software keyboard and the
        // question area filling the remaining space between topbar and input row.

        function fitLayout() {
            const vv  = window.visualViewport;
            const kbH = vv ? Math.max(0, window.innerHeight - vv.height - vv.offsetTop) : 0;

            const inputRow  = document.getElementById('input-row');
            const qArea     = document.getElementById('question-area');
            const mcOverlay = document.getElementById('mc-overlay');
            const inputH    = inputRow.offsetHeight || 76;
            const clampBot  = kbH + inputH;

            inputRow.style.bottom  = kbH + 'px';
            qArea.style.bottom     = clampBot + 'px';
            // Keep MC overlay within the visible area so the grid is never hidden behind the keyboard
            mcOverlay.style.bottom = clampBot + 'px';
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', fitLayout);
            window.visualViewport.addEventListener('scroll', fitLayout);
        }
        fitLayout();

        startFresh();
    </script>
</body>
</html>
