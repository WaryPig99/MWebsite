<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-visual">
    <title>Times Tables — Fractions</title>
    <script>try{if(localStorage.getItem('dark')==='1')document.documentElement.classList.add('dark');}catch(e){}</script>
    <link rel="stylesheet" href="shared.css">
    <style>
        * { -webkit-tap-highlight-color: transparent; }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #faf9f7;
            font-family: 'EB Garamond', serif;
            color: #1a1916;
            position: fixed;
            width: 100%;
        }
        html.dark body { background: #0d0f12; color: #c8c4bc; }

        /* ── TOP BAR ─────────────────────────────────────────────────────── */
        #topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 14px;
            background: #faf9f7;
            border-bottom: 0.5px solid #e0ddd8;
            z-index: 300;
        }
        html.dark #topbar { background: #0d0f12; border-bottom-color: #252830; }

        #mode-btn {
            background: none;
            border: none;
            padding: 4px 0;
            font-family: 'EB Garamond', serif;
            font-size: 13px;
            letter-spacing: .16em;
            text-transform: uppercase;
            color: #aaa69e;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 7px;
            line-height: 1;
        }
        #mode-btn:active { color: #1a1916; }
        html.dark #mode-btn { color: #6a6660; }
        html.dark #mode-btn:active { color: #c8c4bc; }

        #topbar-dark {
            background: none;
            border: none;
            padding: 4px 0;
            font-size: 16px;
            color: #aaa69e;
            cursor: pointer;
            user-select: none;
            line-height: 1;
        }
        html.dark #topbar-dark { color: #6a6660; }

        /* ── MODE DROPDOWN ───────────────────────────────────────────────── */
        #menu-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 280;
        }
        #menu-backdrop.open { display: block; }

        #mode-menu {
            position: fixed;
            top: 44px;
            left: 0;
            min-width: 192px;
            background: #faf9f7;
            border: 0.5px solid #e0ddd8;
            border-top: none;
            z-index: 290;
            display: none;
        }
        html.dark #mode-menu { background: #0d0f12; border-color: #252830; }

        #mode-menu.open {
            display: block;
            animation: menu-drop .14s ease;
        }
        @keyframes menu-drop {
            from { opacity: 0; transform: translateY(-5px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .mode-item {
            display: flex;
            align-items: baseline;
            gap: 11px;
            padding: 13px 18px;
            font-family: 'EB Garamond', serif;
            font-size: 15px;
            letter-spacing: .04em;
            color: #8a8680;
            text-decoration: none;
            border-bottom: 0.5px solid #e0ddd8;
        }
        .mode-item:last-child { border-bottom: none; }
        .mode-item:active { background: #f0ede8; }
        html.dark .mode-item { color: #6a6660; border-bottom-color: #252830; }
        html.dark .mode-item:active { background: #13161a; }

        .mode-item.current {
            color: #1a1916;
        }
        html.dark .mode-item.current { color: #faf9f7; }

        .mode-sym {
            font-family: 'Libre Baskerville', serif;
            font-weight: 700;
            font-size: 14px;
            width: 14px;
            text-align: center;
            flex-shrink: 0;
            color: #c8c4bc;
        }
        .mode-item.current .mode-sym { color: #1a1916; }
        html.dark .mode-sym { color: #3d4148; }
        html.dark .mode-item.current .mode-sym { color: #faf9f7; }

        /* ── SUB-MODE ROW ────────────────────────────────────────────────── */
        #sub-mode-row {
            position: fixed; top: 44px; left: 0; right: 0;
            height: 32px; display: flex; align-items: center; justify-content: center;
            gap: 16px; background: #faf9f7;
            border-bottom: 0.5px solid #e0ddd8; z-index: 10;
        }
        html.dark #sub-mode-row { background: #0d0f12; border-bottom-color: #252830; }

        .sub-btn {
            font-family: 'EB Garamond', serif; font-size: 11px;
            letter-spacing: .14em; text-transform: uppercase; color: #aaa69e;
            cursor: pointer; user-select: none; background: none; border: none; padding: 0;
        }
        .sub-btn.active { color: #1a1916; }
        html.dark .sub-btn { color: #6a6660; }
        html.dark .sub-btn.active { color: #faf9f7; }

        /* ── PROGRESS HAIRLINE ───────────────────────────────────────────── */
        #prog-wrap {
            position: fixed;
            top: 76px; left: 0; right: 0;
            height: 1px;
            background: #e0ddd8;
            z-index: 10;
        }
        html.dark #prog-wrap { background: #252830; }

        #prog-fill {
            height: 100%;
            background: #1a1916;
            width: 0%;
            transition: width .4s ease;
        }
        html.dark #prog-fill { background: #c8c4bc; }

        /* ── QUESTION AREA ───────────────────────────────────────────────── */
        #question-area {
            position: fixed;
            top: 77px;
            left: 0; right: 0;
            /* bottom set dynamically by fitLayout() */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 1.5rem;
        }

        #question {
            font-family: 'Libre Baskerville', serif;
            font-size: 80px;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            text-align: center;
            color: #1a1916;
        }
        html.dark #question { color: #faf9f7; }

        #feedback {
            font-size: 14px;
            font-style: italic;
            text-align: center;
            min-height: 20px;
            margin-top: 12px;
            color: #8a8680;
            letter-spacing: .02em;
        }
        #feedback.correct { color: #3a7d5e; }
        #feedback.wrong   { color: #b84040; }
        html.dark #feedback { color: #6a6660; }

        /* ── INPUT ROW (pinned above keyboard) ───────────────────────────── */
        #input-row {
            position: fixed;
            left: 0; right: 0;
            /* bottom set dynamically by fitLayout() */
            padding: 10px 14px 12px;
            display: flex;
            gap: 8px;
            align-items: center;
            background: rgba(250, 249, 247, 0.15);
            border-top: 0.5px solid #e0ddd8;
            z-index: 20;
        }
        html.dark #input-row { background: rgba(13, 15, 18, 0.15); border-top-color: #252830; }

        /* ── FRACTION INPUTS ─────────────────────────────────────────────── */
        .frac-inp {
            flex: 1;
            min-width: 0;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
            font-family: 'Libre Baskerville', serif;
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            color: #1a1916;
            padding: 12px 4px;
            outline: none;
            -webkit-appearance: none;
            transition: border-color .15s;
        }
        .frac-inp.correct { border-color: #3a7d5e; color: #3a7d5e; }
        .frac-inp.wrong   { border-color: #b84040; color: #b84040; }
        html.dark .frac-inp { background: #13161a; border-color: #252830; color: #faf9f7; }

        #input-sep {
            font-family: 'Libre Baskerville', serif;
            font-size: 26px;
            font-weight: 700;
            color: #c8c4bc;
            flex-shrink: 0;
        }
        html.dark #input-sep { color: #3d4148; }

        #submit-btn {
            flex-shrink: 0;
            width: 56px;
            background: #1a1916;
            color: #faf9f7;
            border: none;
            border-radius: 2px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            cursor: pointer;
            align-self: stretch;
        }
        #submit-btn:active { opacity: .7; }
        html.dark #submit-btn { background: #c8c4bc; color: #0d0f12; }

        /* ── MC OVERLAY ──────────────────────────────────────────────────── */
        #mc-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 100;
            background: rgba(250,249,247,0.88);
            backdrop-filter: blur(4px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        #mc-overlay.visible { display: flex; }
        html.dark #mc-overlay { background: rgba(13,15,18,0.92); }

        #mc-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .2em;
            color: #8a8680;
            margin-bottom: 12px;
        }
        html.dark #mc-label { color: #6a6660; }

        #mc-content {
            font-family: 'Libre Baskerville', serif;
            text-align: center;
            padding: 1rem 1.5rem;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.15);
            min-width: 160px;
            max-height: calc(100% - 80px);
            overflow-y: auto;
        }
        html.dark #mc-content { background: #13161a; border-color: #252830; }

        .mc-fact-row {
            font-size: 15px;
            color: #1a1916;
            margin: 3px 0;
        }
        .mc-fact-row strong { font-weight: 700; }
        html.dark .mc-fact-row { color: #c8c4bc; }
        html.dark .mc-fact-row strong { color: #faf9f7; }

        .mc-fact-divider {
            border: none;
            border-top: 0.5px solid #c8c4bc;
            margin: 6px auto;
            width: 50px;
        }
        html.dark .mc-fact-divider { border-top-color: #252830; }

        .mc-fact-answer {
            font-size: 19px;
            font-weight: 700;
            margin-top: 4px;
        }
        html.dark .mc-fact-answer { color: #faf9f7; }

        #mc-hint {
            margin-top: 10px;
            font-size: 12px;
            font-style: italic;
            color: #c8a060;
            letter-spacing: .04em;
            text-align: center;
        }

        #mc-dismiss {
            margin-top: 14px;
            font-size: 10px;
            color: #aaa69e;
            letter-spacing: .14em;
            text-transform: uppercase;
            font-style: italic;
        }
        html.dark #mc-dismiss { color: #6a6660; }

        /* ── DONE SCREEN ─────────────────────────────────────────────────── */
        #done-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #faf9f7;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        #done-screen.visible { display: flex; }
        html.dark #done-screen { background: #0d0f12; }

        #done-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 500;
            margin-bottom: 6px;
        }
        html.dark #done-title { color: #faf9f7; }

        #done-sub {
            font-size: 15px;
            color: #8a8680;
            font-style: italic;
            margin-bottom: 2rem;
        }
        html.dark #done-sub { color: #6a6660; }

        #done-time {
            font-size: 15px;
            color: #8a8680;
            font-style: italic;
            margin-bottom: 0.5rem;
        }
        html.dark #done-time { color: #6a6660; }

        .done-btn {
            width: 100%;
            max-width: 260px;
            padding: 13px;
            margin-bottom: 10px;
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            letter-spacing: .1em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
        }
        #restart-btn { background: #1a1916; color: #faf9f7; border: none; }
        html.dark #restart-btn { background: #c8c4bc; color: #0d0f12; }
        #missed-btn  { background: transparent; border: 0.5px solid #c8c4bc; color: #1a1916; display: none; }
        html.dark #missed-btn { border-color: #252830; color: #c8c4bc; }

        #done-history { margin-top: 1.5rem; text-align: center; }
    </style>
</head>
<body>

    <!-- TOP BAR -->
    <div id="topbar">
        <button id="mode-btn" aria-label="Mode menu">☰ Mode</button>
        <button id="topbar-dark" onclick="toggleDark()" aria-label="Toggle dark mode">☽</button>
    </div>

    <!-- MODE DROPDOWN -->
    <div id="menu-backdrop"></div>
    <nav id="mode-menu" role="menu">
        <a href="mobile.html"           class="mode-item"         role="menuitem"><span class="mode-sym">×</span>Multiply</a>
        <a href="division-mobile.html"  class="mode-item"         role="menuitem"><span class="mode-sym">÷</span>Division</a>
        <a href="addsubtract-mobile.html" class="mode-item"       role="menuitem"><span class="mode-sym">+</span>Add / Sub</a>
        <a href="fractions-mobile.html" class="mode-item current" role="menuitem"><span class="mode-sym">½</span>Fractions</a>
    </nav>

    <!-- SUB-MODE ROW -->
    <div id="sub-mode-row">
        <button class="sub-btn active" data-mode="simplify" onclick="setMode('simplify')">Simplify</button>
        <button class="sub-btn"        data-mode="ratio"    onclick="setMode('ratio')">Ratio</button>
        <button class="sub-btn"        data-mode="decimal"  onclick="setMode('decimal')">Decimal</button>
    </div>

    <!-- PROGRESS HAIRLINE -->
    <div id="prog-wrap"><div id="prog-fill"></div></div>

    <!-- QUESTION AREA -->
    <div id="question-area">
        <div id="question">?/?</div>
        <div id="feedback"></div>
    </div>

    <!-- INPUT ROW -->
    <div id="input-row">
        <input class="frac-inp" id="answer-num" type="number" inputmode="numeric" placeholder="—" autocomplete="off">
        <div id="input-sep">/</div>
        <input class="frac-inp" id="answer-den" type="number" inputmode="numeric" placeholder="—" autocomplete="off">
        <button id="submit-btn">→</button>
    </div>

    <!-- Hidden DOM nodes required by shared.js -->
    <div id="timer-wrap" style="display:none"><div id="timer-fill"></div></div>
    <div id="hint-text"  style="display:none"></div>
    <span id="s-correct" style="display:none">0</span>
    <span id="s-wrong"   style="display:none">0</span>
    <span id="s-streak"  style="display:none">0</span>

    <!-- MORON CHECKER OVERLAY -->
    <div id="mc-overlay" tabindex="-1">
        <div id="mc-label"></div>
        <div id="mc-content"></div>
        <div id="mc-hint"></div>
        <div id="mc-dismiss">Tap or type to dismiss</div>
    </div>

    <!-- DONE SCREEN -->
    <div id="done-screen">
        <div id="done-title"></div>
        <div id="done-sub"></div>
        <div id="done-time"></div>
        <button class="done-btn" id="restart-btn">Full drill again</button>
        <button class="done-btn" id="missed-btn">Missed only</button>
        <div id="done-history"></div>
    </div>

    <script src="shared.js"></script>
    <script>
        // ── DRILL LOGIC ────────────────────────────────────────────────────────

        let currentMode = 'simplify';
        let queue = [], missed = {};
        let correct = 0, wrong = 0, streak = 0, current = null, total = 0, doneCount = 0;
        let drillStart = null;
        let mcVisible = false;

        function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

        function buildFacts() {
            if (currentMode === 'decimal') return buildDecimalFacts();
            const facts = [];
            for (let a = 1; a <= 12; a++) {
                for (let b = 2; b <= 12; b++) {
                    if (a >= b || gcd(a, b) !== 1) continue;
                    for (let k = 2; k <= 12; k++) {
                        const num = a * k, den = b * k;
                        if (num > 99 || den > 99) continue;
                        facts.push({ num, den, rNum: a, rDen: b, factor: k });
                    }
                }
            }
            return facts;
        }

        function buildDecimalFacts() {
            const termDens = [2, 4, 5, 8, 10];
            const facts = [];
            for (let a = 1; a <= 11; a++) {
                for (const b of termDens) {
                    if (a >= b || gcd(a, b) !== 1) continue;
                    facts.push({ num: a, den: b, rNum: a, rDen: b, factor: 1 });
                }
            }
            return facts;
        }

        function getSep() { return currentMode === 'ratio' ? ':' : '/'; }

        function formatQuestion(fact) {
            if (currentMode === 'simplify') return `${fact.num}/${fact.den}`;
            if (currentMode === 'ratio') return `${fact.num}:${fact.den}`;
            return String(parseFloat((fact.rNum / fact.rDen).toFixed(10)));
        }

        function formatAnswer(fact) {
            return `${fact.rNum}${getSep()}${fact.rDen}`;
        }

        function buildMCContent(fact) {
            const sep = getSep();
            const visual = currentMode === 'ratio'
                ? buildBarSVG(fact.rNum, fact.rDen)
                : buildPieSVG(fact.rNum, fact.rDen);
            if (currentMode === 'decimal') {
                const dec = String(parseFloat((fact.rNum / fact.rDen).toFixed(10)));
                const decStr = dec.split('.')[1] || '';
                const mult = Math.pow(10, decStr.length);
                const bigNum = Math.round(fact.rNum * mult / fact.rDen);
                const div = gcd(bigNum, mult);
                return `<div class="mc-fact-row">${dec} = ${bigNum}/${mult}</div>
                        <div class="mc-fact-row">÷ ${div}</div>
                        <hr class="mc-fact-divider">
                        <div class="mc-fact-row mc-fact-answer">${fact.rNum}/${fact.rDen}</div>
                        ${visual}`;
            }
            return `<div class="mc-fact-row">${fact.num} ÷ ${fact.factor} = <strong>${fact.rNum}</strong></div>
                    <div class="mc-fact-row">${fact.den} ÷ ${fact.factor} = <strong>${fact.rDen}</strong></div>
                    <hr class="mc-fact-divider">
                    <div class="mc-fact-row mc-fact-answer">${fact.rNum} ${sep} ${fact.rDen}</div>
                    ${visual}`;
        }

        function buildPieSVG(n, d) {
            const dark = document.documentElement.classList.contains('dark');
            const bgFill = dark ? '#1e2228' : '#f5f0e8';
            const stroke = dark ? '#252830' : '#c8c4bc';
            const fill = dark ? '#c8c4bc' : '#3a3730';
            const cx = 36, cy = 36, r = 32;
            const angle = (n / d) * 2 * Math.PI;
            let slice;
            if (n >= d) {
                slice = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}"/>`;
            } else {
                const ex = cx + r * Math.sin(angle);
                const ey = cy - r * Math.cos(angle);
                const largeArc = angle > Math.PI ? 1 : 0;
                slice = `<path d="M ${cx} ${cy} L ${cx} ${cy - r} A ${r} ${r} 0 ${largeArc} 1 ${ex.toFixed(2)} ${ey.toFixed(2)} Z" fill="${fill}"/>`;
            }
            return `<svg width="72" height="72" viewBox="0 0 72 72" style="display:block;margin:10px auto 0"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${bgFill}" stroke="${stroke}" stroke-width="0.5"/>${slice}</svg>`;
        }

        function buildBarSVG(a, b) {
            const dark = document.documentElement.classList.contains('dark');
            const fill = dark ? '#c8c4bc' : '#3a3730';
            const maxH = 60, bw = 18, gap = 8, baseY = 64;
            const maxVal = Math.max(a, b);
            const h1 = Math.round((a / maxVal) * maxH);
            const h2 = Math.round((b / maxVal) * maxH);
            return `<svg width="52" height="68" viewBox="0 0 52 68" style="display:block;margin:10px auto 0"><rect x="4" y="${baseY - h1}" width="${bw}" height="${h1}" fill="${fill}"/><rect x="${4 + bw + gap}" y="${baseY - h2}" width="${bw}" height="${h2}" fill="${fill}"/></svg>`;
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.sub-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            document.getElementById('input-sep').textContent = getSep();
            document.getElementById('question').textContent = mode === 'decimal' ? '?' : '?/?';
            startFresh();
        }

        function startFresh() {
            drillStart = Date.now();
            let pool = shuffle(buildFacts());
            queue = [...pool];
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0; total = queue.length;
            document.getElementById('done-screen').classList.remove('visible');
            updateStats(); nextQ();
        }

        function drillMissed() {
            const mf = Object.keys(missed).map(k => missed[k].fact);
            if (!mf.length) return;
            drillStart = Date.now();
            queue = shuffle([...mf, ...mf]);
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0; total = queue.length;
            document.getElementById('done-screen').classList.remove('visible');
            updateStats(); nextQ();
        }

        function nextQ() {
            clearMC();
            if (!queue.length) { showDone(); return; }
            current = queue.pop();
            document.getElementById('question').textContent = formatQuestion(current);
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = '';
            const n = document.getElementById('answer-num'), d = document.getElementById('answer-den');
            n.value = ''; n.className = 'frac-inp';
            d.value = ''; d.className = 'frac-inp';
            n.focus();
            updateProgress(); startMCTimer();
        }

        function clearMC() {
            _clearTimer();
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('mc-hint').textContent = '';
        }

        function dismissMC() {
            if (!mcVisible) return;
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('answer-num').focus();
        }

        function showMC() {
            if (!current) return;
            const q = formatQuestion(current);
            document.getElementById('mc-label').textContent = mcDur > 2500 ? `yeah — ${q}` : `hint — ${q}`;
            document.getElementById('mc-content').innerHTML = buildMCContent(current);
            mcVisible = true;
            document.getElementById('mc-overlay').classList.add('visible');
            document.getElementById('answer-num').focus();
        }

        function submit() {
            if (!current) return;
            if (mcVisible) { dismissMC(); return; }
            clearMC();
            const numVal = parseInt(document.getElementById('answer-num').value);
            const denVal = parseInt(document.getElementById('answer-den').value);
            if (isNaN(numVal) || isNaN(denVal)) return;

            const ok = numVal === current.rNum && denVal === current.rDen;
            const key = `${current.num}${getSep()}${current.den}`;
            const n = document.getElementById('answer-num'), d = document.getElementById('answer-den');

            if (ok) {
                n.className = 'frac-inp correct'; d.className = 'frac-inp correct';
                document.getElementById('feedback').textContent = streak >= 4 ? `${streak + 1} in a row` : 'Correct';
                document.getElementById('feedback').className = 'correct';
                correct++; streak++; doneCount++;
                if (missed[key]) { missed[key].count--; if (missed[key].count <= 0) delete missed[key]; }
                updateStats(); setTimeout(nextQ, 500);
            } else {
                n.className = 'frac-inp wrong'; d.className = 'frac-inp wrong';
                document.getElementById('feedback').textContent = '';
                document.getElementById('feedback').className = 'wrong';
                wrong++; streak = 0;
                if (!missed[key]) missed[key] = { fact: current, count: 0 };
                missed[key].count++;
                queue.unshift(current);
                updateStats(); showMC();
                setTimeout(() => {
                    n.value = ''; n.className = 'frac-inp';
                    d.value = ''; d.className = 'frac-inp';
                    document.getElementById('feedback').textContent = '';
                    document.getElementById('feedback').className = '';
                }, 500);
            }
        }

        function showDone() {
            clearMC();
            const elapsed = drillStart ? Date.now() - drillStart : 0;
            const timeStr = fmtDrillTime(elapsed);
            const t = correct + wrong, pct = t > 0 ? Math.round((correct / t) * 100) : 0;
            document.getElementById('done-title').textContent = pct >= 90 ? 'Excellent.' : pct >= 70 ? 'Good progress.' : 'Keep going.';
            document.getElementById('done-sub').textContent   = `${correct} correct, ${wrong} missed — ${pct}%`;
            document.getElementById('done-time').textContent  = timeStr;
            document.getElementById('missed-btn').style.display = Object.keys(missed).length ? 'block' : 'none';
            const hist = saveDrillResult('history_fractions_' + currentMode, pct, timeStr, 'Full');
            document.getElementById('done-history').innerHTML = renderDrillHistory(hist);
            document.getElementById('done-screen').classList.add('visible');
        }

        // ── EVENT LISTENERS ────────────────────────────────────────────────────

        window.submitAnswer = submit;
        document.getElementById('answer-num').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const denInp = document.getElementById('answer-den');
                if (!denInp.value) { denInp.focus(); } else { window.submitAnswer(); }
            }
        });
        document.getElementById('answer-den').addEventListener('keydown', e => { if (e.key === 'Enter') window.submitAnswer(); });
        document.addEventListener('keydown', e => { if (e.key === 'Enter') return; if (mcVisible) dismissMC(); });

        // Auto-advance: jump to denominator as soon as the typed numerator matches
        document.getElementById('answer-num').addEventListener('input', () => {
            if (!current) return;
            if (parseInt(document.getElementById('answer-num').value) === current.rNum) {
                document.getElementById('answer-den').focus();
            }
        });

        document.getElementById('mc-overlay').addEventListener('click', dismissMC);
        document.getElementById('submit-btn').addEventListener('click', function() { window.submitAnswer(); });
        document.getElementById('restart-btn').addEventListener('click', startFresh);
        document.getElementById('missed-btn').addEventListener('click', drillMissed);

        // ── MODE MENU ──────────────────────────────────────────────────────────

        const modeBtn      = document.getElementById('mode-btn');
        const modeMenu     = document.getElementById('mode-menu');
        const menuBackdrop = document.getElementById('menu-backdrop');

        function openMenu() {
            modeMenu.classList.add('open');
            menuBackdrop.classList.add('open');
        }

        function closeMenu() {
            modeMenu.classList.remove('open');
            menuBackdrop.classList.remove('open');
            document.getElementById('answer-num').focus();
        }

        modeBtn.addEventListener('click', () => {
            modeMenu.classList.contains('open') ? closeMenu() : openMenu();
        });
        menuBackdrop.addEventListener('click', closeMenu);

        // ── VISUAL VIEWPORT LAYOUT ─────────────────────────────────────────────

        function fitLayout() {
            const vv  = window.visualViewport;
            const kbH = vv ? Math.max(0, window.innerHeight - vv.height - vv.offsetTop) : 0;

            const inputRow  = document.getElementById('input-row');
            const qArea     = document.getElementById('question-area');
            const mcOverlay = document.getElementById('mc-overlay');
            const inputH    = inputRow.offsetHeight || 76;
            const clampBot  = kbH + inputH;

            inputRow.style.bottom  = kbH + 'px';
            qArea.style.bottom     = clampBot + 'px';
            mcOverlay.style.bottom = clampBot + 'px';
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', fitLayout);
            window.visualViewport.addEventListener('scroll', fitLayout);
        }
        fitLayout();

        startFresh();
    </script>
    <script src="idle.js"></script>
</body>
</html>
