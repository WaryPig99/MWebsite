<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
    <title>Times Tables — Fractions</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600&family=EB+Garamond:wght@400&family=Libre+Baskerville:wght@400;700&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: #faf9f7;
            font-family: 'EB Garamond', serif;
            color: #1a1916;
            position: fixed;
            width: 100%;
        }

        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 14px;
            border-bottom: 0.5px solid #e0ddd8;
            background: #faf9f7;
            z-index: 10;
        }

        #hud-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .22em;
            text-transform: uppercase;
            color: #aaa69e;
        }

        #hud-stats {
            display: flex;
            gap: 12px;
            font-size: 10px;
            color: #aaa69e;
            letter-spacing: .06em;
            text-transform: uppercase;
        }

            #hud-stats span b {
                font-family: 'Libre Baskerville', serif;
                font-size: 12px;
                font-weight: 700;
                color: #1a1916;
                margin-right: 1px;
            }

        #mc-setting {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 10px;
            color: #c8c4bc;
            letter-spacing: .04em;
        }

            #mc-setting input[type=range] {
                width: 48px;
                accent-color: #1a1916;
            }

        #mc-val {
            font-size: 10px;
            color: #aaa69e;
            min-width: 18px;
        }

        #prog-wrap {
            position: fixed;
            top: 29px;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0ddd8;
            z-index: 10;
        }

        #prog-fill {
            height: 100%;
            background: #1a1916;
            width: 0%;
            transition: width .4s ease;
        }

        /* Mode toggle strip */
        #mode-row {
            position: fixed;
            top: 30px;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 3px 14px;
            border-bottom: 0.5px solid #e0ddd8;
            background: #faf9f7;
            z-index: 10;
        }

        .mode-btn {
            font-family: 'EB Garamond', serif;
            font-size: 10px;
            color: #aaa69e;
            text-transform: uppercase;
            letter-spacing: .12em;
            cursor: pointer;
            user-select: none;
        }

            .mode-btn.active {
                color: #1a1916;
            }

        .mode-sep {
            font-size: 10px;
            color: #c8c4bc;
        }

        #stage {
            position: fixed;
            top: 52px;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 1rem 1.4rem 0.8rem;
        }

        #question {
            font-family: 'Libre Baskerville', serif;
            font-size: 72px;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
            text-align: center;
            margin-bottom: 8px;
        }

        #hint-text {
            font-size: 13px;
            color: #8a8680;
            font-style: italic;
            text-align: center;
            min-height: 18px;
            margin-bottom: 16px;
        }

        #timer-wrap {
            width: 100%;
            height: 1px;
            background: #e0ddd8;
            margin-bottom: 16px;
        }

        #timer-fill {
            height: 100%;
            background: #c8a060;
            width: 100%;
        }

        #input-row {
            width: 100%;
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
            align-items: center;
        }

        .frac-inp {
            flex: 1;
            min-width: 0;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            background: #fff;
            font-family: 'Libre Baskerville', serif;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            color: #1a1916;
            padding: 13px 4px;
            outline: none;
            -webkit-appearance: none;
            transition: border-color .15s;
        }

            .frac-inp.correct {
                border-color: #3a7d5e;
                color: #3a7d5e;
            }

            .frac-inp.wrong {
                border-color: #b84040;
                color: #b84040;
            }

        #input-sep {
            font-family: 'Libre Baskerville', serif;
            font-size: 28px;
            font-weight: 700;
            color: #c8c4bc;
            flex-shrink: 0;
            line-height: 1;
        }

        #submit-btn {
            flex-shrink: 0;
            width: 52px;
            background: #1a1916;
            color: #faf9f7;
            border: none;
            border-radius: 2px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            cursor: pointer;
        }

            #submit-btn:active {
                opacity: .7;
            }

        #feedback {
            font-size: 13px;
            font-style: italic;
            text-align: center;
            min-height: 18px;
            color: #8a8680;
        }

            #feedback.correct {
                color: #3a7d5e;
            }

            #feedback.wrong {
                color: #b84040;
            }

        #hint-btn {
            margin-top: 10px;
            background: transparent;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            padding: 4px 14px;
            font-family: 'EB Garamond', serif;
            font-size: 11px;
            color: #8a8680;
            text-transform: uppercase;
            letter-spacing: .1em;
            cursor: pointer;
        }

        /* MORON CHECKER */
        #mc-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(250,249,247,0.88);
            backdrop-filter: blur(4px);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

            #mc-overlay.visible {
                display: flex;
            }

        #mc-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .2em;
            color: #8a8680;
            margin-bottom: 12px;
        }

        #mc-content {
            font-family: 'Libre Baskerville', serif;
            text-align: center;
            padding: 1rem 1.5rem;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            background: #fff;
            min-width: 160px;
        }

        .mc-fact-row {
            font-size: 15px;
            color: #1a1916;
            margin: 3px 0;
        }

            .mc-fact-row strong {
                font-weight: 700;
            }

        .mc-fact-divider {
            border: none;
            border-top: 0.5px solid #c8c4bc;
            margin: 6px auto;
            width: 50px;
        }

        .mc-fact-answer {
            font-size: 19px;
            font-weight: 700;
            margin-top: 4px;
        }

        #mc-dismiss {
            margin-top: 14px;
            font-size: 10px;
            color: #aaa69e;
            letter-spacing: .14em;
            text-transform: uppercase;
            font-style: italic;
        }

        /* DONE */
        #done-screen {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 50;
            background: #faf9f7;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

            #done-screen.visible {
                display: flex;
            }

        #done-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 48px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        #done-sub {
            font-size: 15px;
            color: #8a8680;
            font-style: italic;
            margin-bottom: 2rem;
        }

        .done-btn {
            width: 100%;
            max-width: 260px;
            padding: 13px;
            margin-bottom: 10px;
            font-family: 'EB Garamond', serif;
            font-size: 14px;
            letter-spacing: .1em;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
        }

        #restart-btn {
            background: #1a1916;
            color: #faf9f7;
            border: none;
        }

        #missed-btn {
            background: transparent;
            border: 0.5px solid #c8c4bc;
            color: #1a1916;
            display: none;
        }

        #done-time {
            font-size: 15px;
            color: #8a8680;
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        #done-history {
            margin-top: 1.5rem;
            text-align: center;
        }

        .done-history-label {
            font-family: 'EB Garamond', serif;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: .14em;
            color: #c8c4bc;
            margin-bottom: 6px;
        }

        .done-history-row {
            font-size: 13px;
            color: #aaa69e;
            font-style: italic;
            margin: 2px 0;
        }
    </style>
</head>
<body>

    <div id="hud">
        <div id="hud-title">
            <a href="mobile.html" style="text-decoration:none;color:#c8c4bc;font-family:'EB Garamond',serif;font-size:10px;letter-spacing:.12em;">× times tables</a>
        </div>
        <div id="hud-stats">
            <span><b id="s-correct">0</b>ok</span>
            <span><b id="s-wrong">0</b>miss</span>
            <span><b id="s-streak">0</b>run</span>
        </div>
        <div id="mc-setting">
            <input type="range" id="mc-range" min="3" max="15" value="5" step="1" oninput="updateTimer(this.value)">
            <span id="mc-val">5s</span>
        </div>
    </div>

    <div id="prog-wrap"><div id="prog-fill"></div></div>

    <div id="mode-row">
        <span class="mode-btn active" data-mode="simplify" onclick="setMode('simplify')">Simplify</span>
        <span class="mode-sep">·</span>
        <span class="mode-btn" data-mode="ratio" onclick="setMode('ratio')">Ratio</span>
        <span class="mode-sep">·</span>
        <span class="mode-btn" data-mode="decimal" onclick="setMode('decimal')">Decimal</span>
    </div>

    <div id="stage">
        <div id="question">?/?</div>
        <div id="hint-text"></div>
        <div id="timer-wrap"><div id="timer-fill"></div></div>
        <div id="input-row">
            <input class="frac-inp" id="answer-num" type="number" inputmode="numeric" placeholder="—" autocomplete="off">
            <div id="input-sep">/</div>
            <input class="frac-inp" id="answer-den" type="number" inputmode="numeric" placeholder="—" autocomplete="off">
            <button id="submit-btn">→</button>
        </div>
        <div id="feedback"></div>
        <button id="hint-btn">Hint</button>
    </div>

    <div id="mc-overlay" tabindex="-1">
        <div id="mc-label"></div>
        <div id="mc-content"></div>
        <div id="mc-dismiss">Tap or type to dismiss</div>
    </div>

    <div id="done-screen">
        <div id="done-title"></div>
        <div id="done-sub"></div>
        <div id="done-time"></div>
        <button class="done-btn" id="restart-btn">Full drill again</button>
        <button class="done-btn" id="missed-btn">Missed only</button>
        <div id="done-history"></div>
    </div>

    <script>
        let currentMode = 'simplify';
        let queue = [], missed = {};
        let correct = 0, wrong = 0, streak = 0, current = null, total = 0, doneCount = 0;
        let drillStart = null;
        let mcTimer = null, mcFrame = null, mcStart = null, mcDur = 5000, mcVisible = false;

        function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

        function buildFacts() {
            if (currentMode === 'decimal') return buildDecimalFacts();
            const facts = [];
            for (let a = 1; a <= 12; a++) {
                for (let b = 2; b <= 12; b++) {
                    if (a >= b || gcd(a, b) !== 1) continue;
                    for (let k = 2; k <= 12; k++) {
                        const num = a * k, den = b * k;
                        if (num > 99 || den > 99) continue;
                        facts.push({ num, den, rNum: a, rDen: b, factor: k });
                    }
                }
            }
            return facts;
        }

        function buildDecimalFacts() {
            const termDens = [2, 4, 5, 8, 10];
            const facts = [];
            for (let a = 1; a <= 11; a++) {
                for (const b of termDens) {
                    if (a >= b || gcd(a, b) !== 1) continue;
                    facts.push({ num: a, den: b, rNum: a, rDen: b, factor: 1 });
                }
            }
            return facts;
        }

        function getSep() { return currentMode === 'ratio' ? ':' : '/'; }

        function formatQuestion(fact) {
            if (currentMode === 'simplify') return `${fact.num}/${fact.den}`;
            if (currentMode === 'ratio') return `${fact.num}:${fact.den}`;
            return String(parseFloat((fact.rNum / fact.rDen).toFixed(10)));
        }

        function formatAnswer(fact) {
            return `${fact.rNum}${getSep()}${fact.rDen}`;
        }

        function buildMCContent(fact) {
            const sep = getSep();
            const visual = currentMode === 'ratio'
                ? buildBarSVG(fact.rNum, fact.rDen)
                : buildPieSVG(fact.rNum, fact.rDen);
            if (currentMode === 'decimal') {
                const dec = String(parseFloat((fact.rNum / fact.rDen).toFixed(10)));
                const decStr = dec.split('.')[1] || '';
                const mult = Math.pow(10, decStr.length);
                const bigNum = Math.round(fact.rNum * mult / fact.rDen);
                const div = gcd(bigNum, mult);
                return `<div class="mc-fact-row">${dec} = ${bigNum}/${mult}</div>
                            <div class="mc-fact-row">÷ ${div}</div>
                            <hr class="mc-fact-divider">
                            <div class="mc-fact-row mc-fact-answer">${fact.rNum}/${fact.rDen}</div>
                            ${visual}`;
            }
            return `<div class="mc-fact-row">${fact.num} ÷ ${fact.factor} = <strong>${fact.rNum}</strong></div>
                        <div class="mc-fact-row">${fact.den} ÷ ${fact.factor} = <strong>${fact.rDen}</strong></div>
                        <hr class="mc-fact-divider">
                        <div class="mc-fact-row mc-fact-answer">${fact.rNum} ${sep} ${fact.rDen}</div>
                        ${visual}`;
        }

        function buildPieSVG(n, d) {
            const cx = 36, cy = 36, r = 32;
            const angle = (n / d) * 2 * Math.PI;
            let slice;
            if (n >= d) {
                slice = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="#3a3730"/>`;
            } else {
                const ex = cx + r * Math.sin(angle);
                const ey = cy - r * Math.cos(angle);
                const largeArc = angle > Math.PI ? 1 : 0;
                slice = `<path d="M ${cx} ${cy} L ${cx} ${cy - r} A ${r} ${r} 0 ${largeArc} 1 ${ex.toFixed(2)} ${ey.toFixed(2)} Z" fill="#3a3730"/>`;
            }
            return `<svg width="72" height="72" viewBox="0 0 72 72" style="display:block;margin:10px auto 0"><circle cx="${cx}" cy="${cy}" r="${r}" fill="#f5f0e8" stroke="#c8c4bc" stroke-width="0.5"/>${slice}</svg>`;
        }

        function buildBarSVG(a, b) {
            const maxH = 60, bw = 18, gap = 8, baseY = 64;
            const maxVal = Math.max(a, b);
            const h1 = Math.round((a / maxVal) * maxH);
            const h2 = Math.round((b / maxVal) * maxH);
            return `<svg width="52" height="68" viewBox="0 0 52 68" style="display:block;margin:10px auto 0"><rect x="4" y="${baseY - h1}" width="${bw}" height="${h1}" fill="#3a3730"/><rect x="${4 + bw + gap}" y="${baseY - h2}" width="${bw}" height="${h2}" fill="#3a3730"/></svg>`;
        }

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
            document.getElementById('input-sep').textContent = getSep();
            document.getElementById('question').textContent = mode === 'decimal' ? '?' : '?/?';
            startFresh();
        }

        function updateTimer(v) { document.getElementById('mc-val').textContent = v + 's'; mcDur = parseInt(v) * 1000; }
        function shuffle(a) { for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[a[i], a[j]] = [a[j], a[i]]; } return a; }

        function startFresh() {
            drillStart = Date.now();
            queue = shuffle(buildFacts());
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0; total = queue.length;
            document.getElementById('done-screen').classList.remove('visible');
            updateStats(); nextQ();
        }

        function drillMissed() {
            const mf = Object.keys(missed).map(k => missed[k].fact);
            if (!mf.length) return;
            drillStart = Date.now();
            queue = shuffle([...mf, ...mf]);
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0; total = queue.length;
            document.getElementById('done-screen').classList.remove('visible');
            updateStats(); nextQ();
        }

        function nextQ() {
            clearMC();
            if (!queue.length) { showDone(); return; }
            current = queue.pop();
            document.getElementById('question').textContent = formatQuestion(current);
            document.getElementById('hint-text').textContent = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = '';
            const n = document.getElementById('answer-num'), d = document.getElementById('answer-den');
            n.value = ''; n.className = 'frac-inp';
            d.value = ''; d.className = 'frac-inp';
            n.focus();
            updateProgress(); startMCTimer();
        }

        let _timerGen = 0, _timerTimeout = null, _timerRaf = null, _timerStart = null;

        function startMCTimer() {
            _clearTimer();
            const gen = ++_timerGen;
            _timerStart = performance.now();
            function tick(now) {
                if (_timerGen !== gen) return;
                const pct = Math.max(0, 1 - (now - _timerStart) / mcDur);
                document.getElementById('timer-fill').style.width = (pct * 100) + '%';
                if (pct > 0) _timerRaf = requestAnimationFrame(tick);
            }
            _timerRaf = requestAnimationFrame(tick);
            _timerTimeout = setTimeout(() => {
                if (_timerGen !== gen) return;
                showMC();
            }, mcDur);
        }

        function _clearTimer() {
            _timerGen++;
            if (_timerTimeout) { clearTimeout(_timerTimeout); _timerTimeout = null; }
            if (_timerRaf) { cancelAnimationFrame(_timerRaf); _timerRaf = null; }
            _timerStart = null;
            document.getElementById('timer-fill').style.width = '100%';
        }

        function clearMC() {
            _clearTimer();
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
        }

        function dismissMC() {
            if (!mcVisible) return;
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('answer-num').focus();
        }

        function showMC() {
            if (!current) return;
            const q = formatQuestion(current);
            document.getElementById('mc-label').textContent = mcDur > 2500 ? `yeah — ${q}` : `hint — ${q}`;
            document.getElementById('mc-content').innerHTML = buildMCContent(current);
            mcVisible = true;
            document.getElementById('mc-overlay').classList.add('visible');
            document.getElementById('answer-num').focus();
        }

        function submit() {
            if (!current) return;
            if (mcVisible) { dismissMC(); return; }
            clearMC();
            const numVal = parseInt(document.getElementById('answer-num').value);
            const denVal = parseInt(document.getElementById('answer-den').value);
            if (isNaN(numVal) || isNaN(denVal)) return;

            const ok = numVal === current.rNum && denVal === current.rDen;
            const key = `${current.num}${getSep()}${current.den}`;
            const n = document.getElementById('answer-num'), d = document.getElementById('answer-den');

            if (ok) {
                n.className = 'frac-inp correct'; d.className = 'frac-inp correct';
                document.getElementById('feedback').textContent = streak >= 4 ? `${streak + 1} in a row` : 'Correct';
                document.getElementById('feedback').className = 'correct';
                correct++; streak++; doneCount++;
                if (missed[key]) { missed[key].count--; if (missed[key].count <= 0) delete missed[key]; }
                updateStats(); setTimeout(nextQ, 500);
            } else {
                n.className = 'frac-inp wrong'; d.className = 'frac-inp wrong';
                document.getElementById('feedback').textContent = formatAnswer(current);
                document.getElementById('feedback').className = 'wrong';
                wrong++; streak = 0;
                if (!missed[key]) missed[key] = { fact: current, count: 0 };
                missed[key].count++;
                queue.unshift(current);
                updateStats(); showMC();
                setTimeout(() => {
                    n.value = ''; n.className = 'frac-inp';
                    d.value = ''; d.className = 'frac-inp';
                    document.getElementById('feedback').textContent = '';
                    document.getElementById('feedback').className = '';
                }, 500);
            }
        }

        function updateStats() {
            document.getElementById('s-correct').textContent = correct;
            document.getElementById('s-wrong').textContent = wrong;
            document.getElementById('s-streak').textContent = streak;
        }

        function updateProgress() {
            const pct = total > 0 ? Math.round((doneCount / total) * 100) : 0;
            document.getElementById('prog-fill').style.width = pct + '%';
        }

        function fmtDrillTime(ms) {
            const s = Math.round(ms / 1000);
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function saveDrillResult(key, pct, timeStr) {
            let hist = [];
            try { hist = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e) {}
            const d = new Date();
            hist.unshift({ date: d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), accuracy: pct, time: timeStr });
            if (hist.length > 5) hist.length = 5;
            try { localStorage.setItem(key, JSON.stringify(hist)); } catch(e) {}
            return hist;
        }

        function renderDrillHistory(hist) {
            if (!hist.length) return '';
            return '<div class="done-history"><div class="done-history-label">Recent</div>'
                + hist.map(r => `<div class="done-history-row">${r.date} &middot; ${r.accuracy}% &middot; ${r.time}</div>`).join('')
                + '</div>';
        }

        function showDone() {
            clearMC();
            const elapsed = drillStart ? Date.now() - drillStart : 0;
            const timeStr = fmtDrillTime(elapsed);
            const t = correct + wrong, pct = t > 0 ? Math.round((correct / t) * 100) : 0;
            document.getElementById('done-title').textContent = pct >= 90 ? 'Excellent.' : pct >= 70 ? 'Good progress.' : 'Keep going.';
            document.getElementById('done-sub').textContent = `${correct} correct, ${wrong} missed — ${pct}%`;
            document.getElementById('done-time').textContent = timeStr;
            document.getElementById('missed-btn').style.display = Object.keys(missed).length ? 'block' : 'none';
            const hist = saveDrillResult('history_fractions_' + currentMode, pct, timeStr);
            document.getElementById('done-history').innerHTML = renderDrillHistory(hist);
            document.getElementById('done-screen').classList.add('visible');
        }

        document.getElementById('answer-num').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const denInp = document.getElementById('answer-den');
                if (!denInp.value) { denInp.focus(); } else { submit(); }
            }
        });
        document.getElementById('answer-den').addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
        document.addEventListener('keydown', e => { if (e.key === 'Enter') return; if (mcVisible) dismissMC(); });

        // Auto-advance: jump to denominator as soon as the typed numerator matches
        document.getElementById('answer-num').addEventListener('input', () => {
            if (!current) return;
            if (parseInt(document.getElementById('answer-num').value) === current.rNum) {
                document.getElementById('answer-den').focus();
            }
        });
        document.getElementById('mc-overlay').addEventListener('click', dismissMC);
        document.getElementById('submit-btn').addEventListener('click', submit);
        document.getElementById('hint-btn').addEventListener('click', () => {
            if (!current) return;
            if (currentMode === 'decimal') {
                document.getElementById('hint-text').textContent = `= ${current.rNum}/${current.rDen}`;
            } else {
                document.getElementById('hint-text').textContent = `÷ ${current.factor} → ${formatAnswer(current)}`;
            }
        });
        document.getElementById('restart-btn').addEventListener('click', startFresh);
        document.getElementById('missed-btn').addEventListener('click', drillMissed);

        function fitStage() {
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            const stage = document.getElementById('stage');
            stage.style.height = (vh - 52) + 'px';
            stage.style.bottom = 'auto';
        }
        if (window.visualViewport) window.visualViewport.addEventListener('resize', fitStage);
        fitStage();

        startFresh();
    </script>
</body>
</html>
