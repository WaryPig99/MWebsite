<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Times Tables — Fractions</title>
    <meta name="description" content="A free fractions drill built by Claude AI. Simplify, ratio, and decimal modes. Wrong answers come back until you know them.">
    <script>
        if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
            window.location.replace('fractions-mobile.html');
        }
    </script>
    <script>try{if(localStorage.getItem('dark')==='1')document.documentElement.classList.add('dark');}catch(e){}</script>
    <link rel="stylesheet" href="shared.css">
    <style>
        .subtitle { margin-bottom: 10px; }

        .mode-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .mode-btn {
            font-family: 'EB Garamond', serif;
            font-size: 11px;
            color: #aaa69e;
            text-transform: uppercase;
            letter-spacing: .12em;
            cursor: pointer;
            transition: color .15s;
            user-select: none;
        }

            .mode-btn:hover { color: #1a1916; }
            .mode-btn.active { color: #1a1916; }

        .mode-sep {
            font-size: 11px;
            color: #c8c4bc;
        }

        .input-sep {
            font-family: 'Libre Baskerville', 'Georgia', serif;
            font-size: 28px;
            font-weight: 700;
            color: #c8c4bc;
            flex-shrink: 0;
            line-height: 1;
        }

        .mc-content {
            font-family: 'Libre Baskerville', 'Georgia', serif;
            text-align: center;
            padding: 1.5rem 2.5rem;
            border: 0.5px solid #c8c4bc;
            border-radius: 2px;
            background: #fff;
            min-width: 180px;
        }

        .mc-fact-row {
            font-size: 17px;
            color: #1a1916;
            margin: 3px 0;
            letter-spacing: -0.3px;
        }

            .mc-fact-row strong { font-weight: 700; color: #1a1916; }

        .mc-fact-divider {
            border: none;
            border-top: 0.5px solid #c8c4bc;
            margin: 8px auto;
            width: 60px;
        }

        .mc-fact-answer {
            font-size: 28px;
            font-weight: 700;
            margin-top: 6px;
            color: #1a1916;
        }

        @media (max-width: 480px) {
            .question { font-size: 56px; }
            .answer-input { font-size: 24px; padding: 14px 6px; }
            .input-sep { font-size: 24px; }
            .submit-btn { padding: 14px 18px; }
            .mc-content { padding: 1rem 1.5rem; }
            .mc-fact-row { font-size: 15px; }
            .mc-fact-answer { font-size: 22px; }
        }

        html.dark .mode-btn { color: #6a6660; }
        html.dark .mode-btn:hover { color: #c8c4bc; }
        html.dark .mode-btn.active { color: #faf9f7; }
        html.dark .mode-sep { color: #3d4148; }
        html.dark .input-sep { color: #3d4148; }
        html.dark .mc-content { background: #13161a; border-color: #252830; }
        html.dark .mc-fact-row { color: #c8c4bc; }
        html.dark .mc-fact-row strong { color: #faf9f7; }
        html.dark .mc-fact-divider { border-top-color: #252830; }
        html.dark .mc-fact-answer { color: #faf9f7; }
    </style>
</head>
<body>

    <button id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">☽</button>

    <div class="header">
        <div class="title" style="font-size:1.1rem;letter-spacing:.18em;text-transform:uppercase;">The Four Operations</div>
        <div class="subtitle">Fractions drill</div>
        <div class="mode-toggle">
            <span class="mode-btn active" data-mode="simplify" onclick="setMode('simplify')">Simplify</span>
            <span class="mode-sep">·</span>
            <span class="mode-btn" data-mode="ratio" onclick="setMode('ratio')">Ratio</span>
            <span class="mode-sep">·</span>
            <span class="mode-btn" data-mode="decimal" onclick="setMode('decimal')">Decimal</span>
        </div>
        <div style="display:flex;align-items:center;justify-content:center;gap:10px;">
            <a href="index.html" style="font-family:'EB Garamond',serif;font-size:11px;color:#aaa69e;text-decoration:none;letter-spacing:.12em;text-transform:uppercase;">× Times Tables</a>
            <span style="color:#c8c4bc;font-size:11px;">·</span>
            <a href="addsubtract.html" style="font-family:'EB Garamond',serif;font-size:11px;color:#aaa69e;text-decoration:none;letter-spacing:.12em;text-transform:uppercase;">+/− add/sub</a>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat"><div class="stat-num" id="s-correct">0</div><div class="stat-label">Correct</div></div>
        <div class="stat"><div class="stat-num" id="s-wrong">0</div><div class="stat-label">Missed</div></div>
        <div class="stat"><div class="stat-num" id="s-streak">0</div><div class="stat-label">Streak</div></div>
    </div>

    <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
    </div>

    <div class="settings-row" style="margin-bottom:.5rem">
        <label>Session</label>
        <span id="sess-full" class="sess-active" onclick="setSessionSize(0)" style="cursor:pointer;min-width:auto;text-align:left;font-weight:600">Full</span>
        <span style="color:#c8c4bc;min-width:auto">·</span>
        <span id="sess-25" onclick="setSessionSize(25)" style="cursor:pointer;min-width:auto;text-align:left">25</span>
        <span style="color:#c8c4bc;min-width:auto">·</span>
        <span id="sess-50" onclick="setSessionSize(50)" style="cursor:pointer;min-width:auto;text-align:left">50</span>
    </div>

    <div class="settings-row">
        <label for="mc-timer-range">Hint timer</label>
        <input type="range" id="mc-timer-range" min="3" max="15" value="5" step="1" oninput="updateTimerLabel(this.value)">
        <span id="mc-timer-label">5s</span>
    </div>

    <div id="drill-screen">
        <div class="card">
            <div class="question" id="question">?/?</div>
            <div class="hint" id="hint-text"></div>
        </div>

        <div class="timer-bar-wrap">
            <div class="timer-bar-fill" id="timer-fill"></div>
        </div>

        <div class="input-row">
            <input class="answer-input" id="answer-num" type="number" inputmode="numeric" placeholder="—" autocomplete="off">
            <div class="input-sep" id="input-sep">/</div>
            <input class="answer-input" id="answer-den" type="number" inputmode="numeric" placeholder="—" autocomplete="off">
            <button class="submit-btn" onclick="submitAnswer()">→</button>
        </div>

        <div class="feedback" id="feedback"></div>
        <button class="hint-btn" onclick="showHint()">Show hint</button>

        <div class="missed-section" id="missed-section" style="display:none">
            <div class="missed-title">Still shaky</div>
            <div class="missed-pills" id="missed-pills"></div>
        </div>
    </div>

    <div class="done-screen" id="done-screen">
        <div class="done-panel">
            <div class="done-title" id="done-title">Complete.</div>
            <div class="done-sub" id="done-sub"></div>
            <div class="done-sub" id="done-time"></div>
            <div class="done-buttons">
                <button class="restart-btn" onclick="startFresh()">Full drill again</button>
                <button class="missed-only-btn" id="missed-only-btn" onclick="drillMissed()">Missed only</button>
            </div>
            <div id="done-history"></div>
        </div>
    </div>

    <div class="mc-overlay" id="mc-overlay" tabindex="-1" onclick="dismissMC()">
        <div class="mc-label" id="mc-label"></div>
        <div class="mc-content" id="mc-content"></div>
        <div class="mc-hint" id="mc-hint"></div>
        <div class="mc-dismiss">Any key or tap to dismiss</div>
    </div>

    <script src="shared.js"></script>
    <script src="idle.js?v=0.1"></script>
    <script>
        let currentMode = 'simplify';
        let queue = [], missed = {}, correct = 0, wrong = 0, streak = 0, current = null, total = 0, doneCount = 0;
        let drillStart = null;
        let mcVisible = false;
        let sessionSize = 0;

        function clearMC() {
            _clearTimer();
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('mc-hint').textContent = '';
        }

        function dismissMC() {
            if (!mcVisible) return;
            mcVisible = false;
            document.getElementById('mc-overlay').classList.remove('visible');
            document.getElementById('answer-num').focus();
        }

        function showMC() {
            if (!current) return;
            document.getElementById('mc-label').textContent = buildMCLabel(current);
            document.getElementById('mc-content').innerHTML = buildMCContent(current);
            mcVisible = true;
            document.getElementById('mc-overlay').classList.add('visible');
            document.getElementById('answer-num').focus();
        }

        // ── DATA ────────────────────────────────────────────────────────
        function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

        function buildFacts() {
            if (currentMode === 'decimal') return buildDecimalFacts();
            const facts = [];
            for (let a = 1; a <= 12; a++) {
                for (let b = 2; b <= 12; b++) {
                    if (a >= b || gcd(a, b) !== 1) continue;
                    for (let k = 2; k <= 12; k++) {
                        const num = a * k, den = b * k;
                        if (num > 99 || den > 99) continue;
                        facts.push({ num, den, rNum: a, rDen: b, factor: k });
                    }
                }
            }
            return facts;
        }

        function buildDecimalFacts() {
            const termDens = [2, 4, 5, 8, 10];
            const facts = [];
            for (let a = 1; a <= 11; a++) {
                for (const b of termDens) {
                    if (a >= b || gcd(a, b) !== 1) continue;
                    facts.push({ num: a, den: b, rNum: a, rDen: b, factor: 1 });
                }
            }
            return facts;
        }

        function getSep() { return currentMode === 'ratio' ? ':' : '/'; }

        function formatQuestion(fact) {
            if (currentMode === 'simplify') return `${fact.num}/${fact.den}`;
            if (currentMode === 'ratio') return `${fact.num}:${fact.den}`;
            return String(parseFloat((fact.rNum / fact.rDen).toFixed(10)));
        }

        function formatAnswer(fact) {
            return `${fact.rNum}${getSep()}${fact.rDen}`;
        }

        function formatMissedPill(fact) {
            const sep = getSep();
            if (currentMode === 'decimal') {
                const dec = String(parseFloat((fact.rNum / fact.rDen).toFixed(10)));
                return `${dec} = ${fact.rNum}/${fact.rDen}`;
            }
            return `${fact.num}${sep}${fact.den} = ${fact.rNum}${sep}${fact.rDen}`;
        }

        function buildMCContent(fact) {
            const sep = getSep();
            const visual = currentMode === 'ratio'
                ? buildBarSVG(fact.rNum, fact.rDen)
                : buildPieSVG(fact.rNum, fact.rDen);
            if (currentMode === 'decimal') {
                const dec = String(parseFloat((fact.rNum / fact.rDen).toFixed(10)));
                const decStr = dec.split('.')[1] || '';
                const mult = Math.pow(10, decStr.length);
                const bigNum = Math.round(fact.rNum * mult / fact.rDen);
                const div = gcd(bigNum, mult);
                return `<div class="mc-fact-row">${dec} = ${bigNum}/${mult}</div>
                            <div class="mc-fact-row">÷ ${div}</div>
                            <hr class="mc-fact-divider">
                            <div class="mc-fact-row mc-fact-answer">${fact.rNum}/${fact.rDen}</div>
                            ${visual}`;
            }
            return `<div class="mc-fact-row">${fact.num} ÷ ${fact.factor} = <strong>${fact.rNum}</strong></div>
                        <div class="mc-fact-row">${fact.den} ÷ ${fact.factor} = <strong>${fact.rDen}</strong></div>
                        <hr class="mc-fact-divider">
                        <div class="mc-fact-row mc-fact-answer">${fact.rNum} ${sep} ${fact.rDen}</div>
                        ${visual}`;
        }

        function buildPieSVG(n, d) {
            const dark = document.documentElement.classList.contains('dark');
            const bgFill = dark ? '#1e2228' : '#f5f0e8';
            const stroke = dark ? '#252830' : '#c8c4bc';
            const fill = dark ? '#c8c4bc' : '#3a3730';
            const cx = 36, cy = 36, r = 32;
            const angle = (n / d) * 2 * Math.PI;
            let slice;
            if (n >= d) {
                slice = `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}"/>`;
            } else {
                const ex = cx + r * Math.sin(angle);
                const ey = cy - r * Math.cos(angle);
                const largeArc = angle > Math.PI ? 1 : 0;
                slice = `<path d="M ${cx} ${cy} L ${cx} ${cy - r} A ${r} ${r} 0 ${largeArc} 1 ${ex.toFixed(2)} ${ey.toFixed(2)} Z" fill="${fill}"/>`;
            }
            return `<svg width="72" height="72" viewBox="0 0 72 72" style="display:block;margin:10px auto 0"><circle cx="${cx}" cy="${cy}" r="${r}" fill="${bgFill}" stroke="${stroke}" stroke-width="0.5"/>${slice}</svg>`;
        }

        function buildBarSVG(a, b) {
            const dark = document.documentElement.classList.contains('dark');
            const fill = dark ? '#c8c4bc' : '#3a3730';
            const maxH = 60, bw = 18, gap = 8, baseY = 64;
            const maxVal = Math.max(a, b);
            const h1 = Math.round((a / maxVal) * maxH);
            const h2 = Math.round((b / maxVal) * maxH);
            return `<svg width="52" height="68" viewBox="0 0 52 68" style="display:block;margin:10px auto 0"><rect x="4" y="${baseY - h1}" width="${bw}" height="${h1}" fill="${fill}"/><rect x="${4 + bw + gap}" y="${baseY - h2}" width="${bw}" height="${h2}" fill="${fill}"/></svg>`;
        }

        function buildMCLabel(fact) {
            const q = formatQuestion(fact);
            return mcDur > 2500 ? `yeah — ${q}` : `hint — ${q}`;
        }

        // ── FLOW ────────────────────────────────────────────────────────
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.mode-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.mode === mode);
            });
            document.getElementById('input-sep').textContent = getSep();
            document.getElementById('question').textContent = mode === 'decimal' ? '?' : '?/?';
            startFresh();
        }

        function updateTimerLabel(val) {
            document.getElementById('mc-timer-label').textContent = val + 's';
            mcDur = parseInt(val) * 1000;
        }

        function setSessionSize(n) {
            sessionSize = n;
            [['sess-full', 0], ['sess-25', 25], ['sess-50', 50]].forEach(([id, val]) => {
                const el = document.getElementById(id);
                el.classList.toggle('sess-active', n === val);
                el.style.fontWeight = n === val ? '600' : '';
            });
            startFresh();
        }

        function startFresh() {
            drillStart = Date.now();
            let pool = shuffle(buildFacts());
            if (sessionSize > 0) pool = pool.slice(0, sessionSize);
            queue = [...pool];
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0;
            total = queue.length;
            document.getElementById('done-screen').style.display = 'none';
            document.getElementById('drill-screen').style.display = 'block';
            updateStats(); nextQuestion();
        }

        function drillMissed() {
            const mf = Object.keys(missed).map(k => missed[k].fact);
            if (!mf.length) return;
            drillStart = Date.now();
            queue = shuffle([...mf, ...mf]);
            missed = {}; correct = 0; wrong = 0; streak = 0; doneCount = 0;
            total = queue.length;
            document.getElementById('done-screen').style.display = 'none';
            document.getElementById('drill-screen').style.display = 'block';
            updateStats(); nextQuestion();
        }

        function nextQuestion() {
            clearMC();
            if (!queue.length) { showDone(); return; }
            current = queue.pop();
            document.getElementById('question').textContent = formatQuestion(current);
            document.getElementById('hint-text').textContent = '';
            document.getElementById('feedback').textContent = '';
            document.getElementById('feedback').className = 'feedback';
            const numInp = document.getElementById('answer-num');
            const denInp = document.getElementById('answer-den');
            numInp.value = ''; numInp.className = 'answer-input';
            denInp.value = ''; denInp.className = 'answer-input';
            numInp.focus();
            updateProgress(); updateMissed();
            startMCTimer();
        }

        function showHint() {
            if (!current) return;
            if (currentMode === 'decimal') {
                document.getElementById('hint-text').textContent = `= ${current.rNum}/${current.rDen}`;
            } else {
                document.getElementById('hint-text').textContent = `÷ ${current.factor} → ${formatAnswer(current)}`;
            }
        }

        function submitAnswer() {
            if (!current) return;
            if (mcVisible) { dismissMC(); return; }
            clearMC();
            const numVal = parseInt(document.getElementById('answer-num').value);
            const denVal = parseInt(document.getElementById('answer-den').value);
            if (isNaN(numVal) || isNaN(denVal)) return;

            const isCorrect = numVal === current.rNum && denVal === current.rDen;
            const key = `${current.num}${getSep()}${current.den}`;
            const numInp = document.getElementById('answer-num');
            const denInp = document.getElementById('answer-den');

            if (isCorrect) {
                numInp.className = 'answer-input correct';
                denInp.className = 'answer-input correct';
                document.getElementById('feedback').textContent = streak >= 4 ? `${streak + 1} in a row` : 'Correct';
                document.getElementById('feedback').className = 'feedback correct';
                correct++; streak++; doneCount++;
                if (missed[key]) { missed[key].count--; if (missed[key].count <= 0) delete missed[key]; }
                updateStats();
                setTimeout(nextQuestion, 600);
            } else {
                numInp.className = 'answer-input wrong';
                denInp.className = 'answer-input wrong';
                document.getElementById('feedback').textContent = '';
                document.getElementById('feedback').className = 'feedback wrong';
                wrong++; streak = 0;
                if (!missed[key]) missed[key] = { fact: current, count: 0 };
                missed[key].count++;
                queue.unshift(current);
                updateStats();
                showMC();
                setTimeout(() => {
                    numInp.value = ''; numInp.className = 'answer-input';
                    denInp.value = ''; denInp.className = 'answer-input';
                    document.getElementById('feedback').textContent = '';
                    document.getElementById('feedback').className = 'feedback';
                }, 500);
            }
        }

        function updateMissed() {
            const keys = Object.keys(missed);
            const sec = document.getElementById('missed-section');
            if (!keys.length) { sec.style.display = 'none'; return; }
            sec.style.display = 'block';
            document.getElementById('missed-pills').innerHTML = keys.map(k =>
                `<span class="missed-pill">${formatMissedPill(missed[k].fact)}</span>`
            ).join('');
        }

        function showDone() {
            clearMC();
            document.getElementById('drill-screen').style.display = 'none';
            document.getElementById('done-screen').style.display = 'flex';
            const elapsed = drillStart ? Date.now() - drillStart : 0;
            const timeStr = fmtDrillTime(elapsed);
            const sessionLabel = sessionSize === 0 ? 'Full' : String(sessionSize);
            const t = correct + wrong;
            const pct = t > 0 ? Math.round((correct / t) * 100) : 0;
            const spm = elapsed > 0 ? Math.round(t / (elapsed / 60000)) : 0;
            document.getElementById('done-title').textContent = pct >= 90 ? 'Excellent.' : pct >= 70 ? 'Good progress.' : 'Keep going.';
            document.getElementById('done-sub').textContent = `${correct} correct, ${wrong} missed — ${pct}% accuracy`;
            document.getElementById('done-time').textContent = timeStr + ' · ' + sessionLabel;
            document.getElementById('missed-only-btn').style.display = Object.keys(missed).length ? 'inline-block' : 'none';
            const hist = saveDrillResult('history_fractions_' + currentMode, pct, timeStr, sessionLabel, spm);
            document.getElementById('done-history').innerHTML = renderDrillHistory(hist);
        }

        document.getElementById('answer-num').addEventListener('keydown', e => {
            if (e.key === 'Enter') {
                const denInp = document.getElementById('answer-den');
                if (!denInp.value) { denInp.focus(); } else { submitAnswer(); }
            }
        });
        document.getElementById('answer-den').addEventListener('keydown', e => { if (e.key === 'Enter') submitAnswer(); });
        document.addEventListener('keydown', e => { if (e.key === 'Enter') return; if (mcVisible) dismissMC(); });

        document.getElementById('answer-num').addEventListener('input', () => {
            if (!current) return;
            if (parseInt(document.getElementById('answer-num').value) === current.rNum) {
                document.getElementById('answer-den').focus();
            }
        });

        startFresh();
    </script>

    <div style="margin-top:1.5rem;font-family:'EB Garamond','Times New Roman',serif;font-size:12px;color:#aaa69e;letter-spacing:.08em;text-align:center;line-height:1.8;">
        <div>Made with AI</div>
        <div><a href="https://github.com/PositiveAttempt" target="_blank" rel="noopener" style="color:#aaa69e;text-decoration:none;">PositiveAttempt</a></div>
    </div>

</body>
</html>
